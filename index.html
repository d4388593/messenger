<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WebGram Pro – Secure Messenger</title>
    <style>
        :root {
          --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9;
          --text-secondary: #8b949e; --accent: #58a6ff;
          --accent-gradient: linear-gradient(135deg, #58a6ff, #bc8cff);
          --msg-sent: #1f6feb; --msg-received: #21262d; --danger: #f85149;
          --success: #3fb950; --warning: #d2991d; --radius: 12px;
          --shadow: 0 8px 24px rgba(0,0,0,0.4); --transition: 0.2s ease;
        }
        .light {
          --bg: #f0f2f5; --panel: #ffffff; --border: #d0d5dd; --text: #1a1a1a;
          --text-secondary: #5a5a5a; --msg-received: #ffffff;
          --msg-sent: #e3f2fd; --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: background 0.3s; }
        #app { width: 100%; height: 100vh; display: flex; background: var(--panel); border-radius: 0; overflow: hidden; }

        .auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at top, #161b22, #0d1117); display:flex; align-items:center; justify-content:center; z-index:100; }
        .light .auth-overlay { background: radial-gradient(circle at top, #e0e0e0, #f0f2f5); }
        .auth-card { background: var(--panel); padding: 32px; border-radius: var(--radius); box-shadow: var(--shadow); width: 360px; text-align: center; border: 1px solid var(--border); }
        .auth-card h2 { margin-bottom: 24px; font-weight: 600; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; font-size: 15px; }
        .auth-card input:focus { border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--accent-gradient); color: white; font-weight: 600; cursor: pointer; font-size: 16px; transition: var(--transition); }
        .auth-card button.secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); margin-top: 8px; }
        .auth-card .toggle-text { margin-top: 16px; font-size: 14px; color: var(--text-secondary); cursor: pointer; }
        .auth-error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; opacity: 0; transition: opacity 0.3s; }
        .auth-error.visible { opacity: 1; }

        #main-ui { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 320px; min-width: 320px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid var(--border); transition: transform 0.3s; }
        @media (max-width: 768px) {
          .sidebar { position: absolute; top:0; left:0; height:100%; z-index: 10; transform: translateX(-100%); }
          .sidebar.open { transform: translateX(0); }
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header .logo { font-size: 22px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .search-box { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
        .search-box input { background: none; border: none; color: var(--text); outline: none; width: 100%; font-size: 14px; }
        .sort-select { margin-top: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: 13px; width: 100%; }
        .chat-list { flex:1; overflow-y:auto; }
        .chat-item { display: flex; align-items: center; padding: 14px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: var(--transition); }
        .chat-item:hover, .chat-item.active { background: rgba(88,166,255,0.1); }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; margin-right: 12px; flex-shrink: 0; text-transform: uppercase; overflow: hidden; cursor: pointer; }
        .chat-info { flex:1; overflow: hidden; }
        .chat-info .name { font-weight: 500; margin-bottom: 2px; cursor: pointer; }
        .chat-info .last-msg { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--text-secondary); margin-left: 8px; }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; }
        .sidebar-footer button { flex:1; padding: 10px; border: none; border-radius: 8px; background: var(--accent-gradient); color: white; font-weight: 600; cursor: pointer; font-size: 13px; white-space: nowrap; }

        .chat-main { flex:1; display:flex; flex-direction: column; position:relative; background: var(--bg); min-width: 0; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--panel); display: flex; align-items: center; justify-content: space-between; }
        .chat-header .user-info { display: flex; align-items: center; gap: 12px; }
        .chat-header .actions { display: flex; gap: 10px; }
        .icon-btn { background: var(--bg); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 18px; transition: var(--transition); }
        .icon-btn:hover { background: var(--border); }

        .messages { flex:1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrapper { display: flex; align-items: flex-end; gap: 8px; max-width: 75%; }
        .msg-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.received { align-self: flex-start; }
        .msg-bubble { padding: 10px 14px; border-radius: 18px; position: relative; word-wrap: break-word; line-height: 1.4; background: var(--msg-received); border: 1px solid var(--border); }
        .sent .msg-bubble { background: var(--msg-sent); border-color: var(--accent); }
        .msg-sender { font-size: 12px; color: var(--accent); margin-bottom: 4px; font-weight: 500; }
        .msg-text { font-size: 15px; }
        .msg-time { font-size: 11px; color: var(--text-secondary); margin-top: 4px; text-align: right; }

        .input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--panel); display: flex; align-items: center; gap: 10px; }
        .input-area input[type="text"] { flex:1; background: var(--bg); border: 1px solid var(--border); border-radius: 24px; padding: 12px 18px; color: var(--text); outline: none; font-size: 15px; }
        .record-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index:500; }
        .modal { background: var(--panel); border-radius: var(--radius); padding: 24px; width: 450px; max-width: 90%; border: 1px solid var(--border); box-shadow: var(--shadow); max-height: 80vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 16px; font-weight: 600; }
        .modal input, .modal textarea { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); margin-bottom: 12px; font-size: 14px; }
        .user-list { max-height: 200px; overflow-y: auto; margin-bottom: 16px; }
        .user-item { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 8px; }
        .user-item:hover { background: rgba(88,166,255,0.1); }

        .hidden { display: none !important; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 28px; border-radius: 30px; background: var(--panel); border: 1px solid var(--accent); color: var(--text); box-shadow: var(--shadow); z-index: 9999; font-weight: 500; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        .bg-default { background: var(--bg); }
        .bg-gradient1 { background: linear-gradient(135deg, #1a0533, #0d1117, #1a0533) !important; }
        .bg-pattern { background-image: radial-gradient(circle, #30363d 1px, transparent 1px); background-size: 20px 20px; }
        .bg-galaxy { background: radial-gradient(ellipse at bottom, #1b2735, #090a0f) !important; }
    </style>
</head>
<body>
<div id="app">
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">🚀 WebGram Pro</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <input type="password" id="reg-confirm-pass" class="hidden" placeholder="Confirm Password">
            <div id="auth-error" class="auth-error"></div>
            <button id="auth-btn">Login</button>
            <button id="auth-reg-btn" class="secondary" style="display:none;">Register</button>
            <div id="auth-toggle" class="toggle-text">No account? <span style="color:var(--accent);">Register</span></div>
        </div>
    </div>

    <div id="main-ui" class="hidden">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span>WebGram</span>
                    <div style="display:flex; gap:8px;">
                        <button id="theme-toggle" class="icon-btn">🌙</button>
                        <button id="profile-btn" class="icon-btn">👤</button>
                        <button id="logout-btn" class="icon-btn">↪</button>
                    </div>
                </div>
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="search-input" placeholder="Search chats...">
                </div>
                <select id="sort-select" class="sort-select">
                    <option value="time">By time</option>
                    <option value="name">By name</option>
                </select>
            </div>
            <div class="chat-list" id="chat-list">
                <div style="padding:20px; text-align:center; color:var(--text-secondary);">No chats yet.<br>Click "New Chat" to start!</div>
            </div>
            <div class="sidebar-footer">
                <button id="new-chat-btn">+ New Chat</button>
                <button id="create-group-btn">+ Create Group</button>
            </div>
        </div>

        <div class="chat-main">
            <div id="empty-chat" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-secondary);">
                Select a chat to start messaging
            </div>
            <div id="chat-view" class="hidden" style="flex:1; display:flex; flex-direction:column;">
                <div class="chat-header">
                    <div class="user-info">
                        <span class="back-btn" id="back-btn" style="cursor:pointer; font-size:24px; display:none;">←</span>
                        <div class="avatar" id="chat-avatar">?</div>
                        <div>
                            <div id="chat-name" style="font-weight:600;">...</div>
                            <div id="chat-status" style="font-size:12px; color:var(--text-secondary);">Online</div>
                        </div>
                    </div>
                    <div class="actions">
                        <button id="call-btn" class="icon-btn">📞</button>
                    </div>
                </div>
                <div class="messages bg-default" id="messages-container"></div>
                <div class="input-area">
                    <input type="text" id="msg-input" placeholder="Type a message...">
                    <button id="send-btn" class="record-btn" style="background: var(--accent-gradient); color: white; border: none;">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCtPt1M2ej6B91yBx5VepU8SnrfO9MQAlk",
      authDomain: "webgram-pro.firebaseapp.com",
      projectId: "webgram-pro",
      storageBucket: "webgram-pro.appspot.com",
      messagingSenderId: "123456789012",
      appId: "1:123456789012:web:abcdef1234567890"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // DOM elements
    const $ = id => document.getElementById(id);

    let currentUser = null;
    let currentChat = null;
    let chats = [];
    let messagesUnsubscribe = null;

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Create a new private chat
    async function createPrivateChat(otherUserId, otherUserName) {
      const chatId = [currentUser.uid, otherUserId].sort().join('_');
      const chatRef = db.collection('chats').doc(chatId);

      const chatDoc = await chatRef.get();
      if (!chatDoc.exists) {
        await chatRef.set({
          id: chatId,
          name: otherUserName,
          type: 'private',
          participants: [currentUser.uid, otherUserId],
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastUpdated: Date.now(),
          lastMessage: ''
        });
      }

      // Add to user's chats list
      const userChatsRef = db.collection('userChats').doc(currentUser.uid);
      const userChats = await userChatsRef.get();
      if (userChats.exists) {
        const chats = userChats.data().chats || [];
        if (!chats.includes(chatId)) {
          await userChatsRef.update({ chats: firebase.firestore.FieldValue.arrayUnion(chatId) });
        }
      } else {
        await userChatsRef.set({ chats: [chatId] });
      }

      const otherUserChatsRef = db.collection('userChats').doc(otherUserId);
      const otherUserChats = await otherUserChatsRef.get();
      if (otherUserChats.exists) {
        const chats = otherUserChats.data().chats || [];
        if (!chats.includes(chatId)) {
          await otherUserChatsRef.update({ chats: firebase.firestore.FieldValue.arrayUnion(chatId) });
        }
      } else {
        await otherUserChatsRef.set({ chats: [chatId] });
      }

      await loadChats();
      return chatId;
    }

    // Load all chats for current user
    async function loadChats() {
      if (!currentUser) return;

      const userChatsDoc = await db.collection('userChats').doc(currentUser.uid).get();
      const chatIds = userChatsDoc.data()?.chats || [];

      chats = [];
      for (const chatId of chatIds) {
        const chatDoc = await db.collection('chats').doc(chatId).get();
        if (chatDoc.exists) {
          chats.push({ id: chatId, ...chatDoc.data() });
        }
      }

      renderChatList();
    }

    function renderChatList() {
      const searchTerm = $('search-input').value.toLowerCase();
      let filtered = chats.filter(c => c.name?.toLowerCase().includes(searchTerm));

      const container = $('chat-list');
      if (filtered.length === 0) {
        container.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-secondary);">No chats yet.<br>Click "New Chat" to start!</div>';
        return;
      }

      container.innerHTML = '';
      filtered.forEach(chat => {
        const div = document.createElement('div');
        div.className = `chat-item ${currentChat?.id === chat.id ? 'active' : ''}`;
        div.innerHTML = `
          <div class="avatar">${chat.name?.[0]?.toUpperCase() || '💬'}</div>
          <div class="chat-info">
            <div class="name">${chat.name}</div>
            <div class="last-msg">${chat.lastMessage?.substring(0, 30) || 'No messages yet'}</div>
          </div>
          <div class="chat-time">${chat.lastUpdated ? new Date(chat.lastUpdated).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</div>
        `;
        div.onclick = () => selectChat(chat);
        container.appendChild(div);
      });
    }

    function selectChat(chat) {
      currentChat = chat;
      $('chat-name').textContent = chat.name;
      $('empty-chat').classList.add('hidden');
      $('chat-view').classList.remove('hidden');

      if (messagesUnsubscribe) messagesUnsubscribe();

      const messagesRef = db.collection('chats').doc(chat.id).collection('messages').orderBy('timestamp', 'asc');
      messagesUnsubscribe = messagesRef.onSnapshot(snapshot => {
        const container = $('messages-container');
        container.innerHTML = '';

        snapshot.forEach(doc => {
          const msg = doc.data();
          const isSent = msg.senderId === currentUser.uid;
          const wrapper = document.createElement('div');
          wrapper.className = `msg-wrapper ${isSent ? 'sent' : 'received'}`;

          const bubble = document.createElement('div');
          bubble.className = 'msg-bubble';

          if (!isSent && msg.senderName) {
            const sender = document.createElement('div');
            sender.className = 'msg-sender';
            sender.textContent = msg.senderName;
            bubble.appendChild(sender);
          }

          const text = document.createElement('div');
          text.className = 'msg-text';
          text.textContent = msg.text || '';
          bubble.appendChild(text);

          const time = document.createElement('div');
          time.className = 'msg-time';
          time.textContent = msg.timestamp?.toDate()?.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || 'Just now';
          bubble.appendChild(time);

          wrapper.appendChild(bubble);
          container.appendChild(wrapper);
        });

        container.scrollTop = container.scrollHeight;
      });

      if (window.innerWidth <= 768) {
        $('sidebar').classList.remove('open');
        $('back-btn').style.display = 'block';
      }
    }

    async function sendMessage() {
      if (!currentChat || !currentUser) return;
      const input = $('msg-input');
      const text = input.value.trim();
      if (!text) return;

      await db.collection('chats').doc(currentChat.id).collection('messages').add({
        text: text,
        senderId: currentUser.uid,
        senderName: currentUser.displayName || currentUser.email?.split('@')[0],
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });

      await db.collection('chats').doc(currentChat.id).update({
        lastMessage: text,
        lastUpdated: Date.now()
      });

      input.value = '';
    }

    // Show user selector for new chat
    async function showNewChatModal() {
      const users = await db.collection('users').get();
      const userList = users.docs.filter(doc => doc.id !== currentUser.uid);

      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <h3>New Chat</h3>
          <div class="user-list" id="user-list-modal">
            ${userList.map(user => `
              <div class="user-item" data-id="${user.id}" data-name="${user.data().displayName || user.data().email?.split('@')[0]}">
                <div class="avatar" style="width:36px;height:36px;font-size:16px;">${(user.data().displayName || user.data().email?.[0] || '?')[0].toUpperCase()}</div>
                <div>${user.data().displayName || user.data().email?.split('@')[0]}</div>
              </div>
            `).join('')}
            ${userList.length === 0 ? '<div style="padding:20px; text-align:center;">No other users found</div>' : ''}
          </div>
          <button id="close-modal" style="width:100%; padding:10px; background:#21262d; border:none; border-radius:8px; color:white; cursor:pointer;">Cancel</button>
        </div>
      `;

      document.body.appendChild(modal);

      modal.querySelectorAll('.user-item').forEach(el => {
        el.onclick = async () => {
          const userId = el.dataset.id;
          const userName = el.dataset.name;
          await createPrivateChat(userId, userName);
          modal.remove();
          showToast(`Chat with ${userName} created!`);
        };
      });

      modal.querySelector('#close-modal').onclick = () => modal.remove();
    }

    // Create group
    async function showCreateGroupModal() {
      const users = await db.collection('users').get();
      const userList = users.docs.filter(doc => doc.id !== currentUser.uid);
      let selectedUsers = [];

      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <h3>Create Group</h3>
          <input type="text" id="group-name-input" placeholder="Group name" style="width:100%;">
          <div class="user-list" id="group-user-list" style="max-height:300px;">
            ${userList.map(user => `
              <div class="user-item" data-id="${user.id}" data-name="${user.data().displayName || user.data().email?.split('@')[0]}">
                <div class="avatar" style="width:36px;height:36px;font-size:16px;">${(user.data().displayName || user.data().email?.[0] || '?')[0].toUpperCase()}</div>
                <div>${user.data().displayName || user.data().email?.split('@')[0]}</div>
                <span class="checkmark" style="margin-left:auto; display:none;">✓</span>
              </div>
            `).join('')}
          </div>
          <button id="create-group-confirm" style="width:100%; padding:12px; background:var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer; margin-bottom:8px;">Create Group</button>
          <button id="close-group-modal" style="width:100%; padding:10px; background:#21262d; border:none; border-radius:8px; color:white; cursor:pointer;">Cancel</button>
        </div>
      `;

      document.body.appendChild(modal);

      modal.querySelectorAll('.user-item').forEach(el => {
        el.onclick = () => {
          const userId = el.dataset.id;
          const checkmark = el.querySelector('.checkmark');
          if (selectedUsers.includes(userId)) {
            selectedUsers = selectedUsers.filter(id => id !== userId);
            checkmark.style.display = 'none';
          } else {
            selectedUsers.push(userId);
            checkmark.style.display = 'block';
          }
        };
      });

      modal.querySelector('#create-group-confirm').onclick = async () => {
        const groupName = modal.querySelector('#group-name-input').value.trim();
        if (!groupName) {
          showToast('Please enter group name');
          return;
        }
        if (selectedUsers.length === 0) {
          showToast('Please select at least one member');
          return;
        }

        const chatId = `group_${Date.now()}`;
        const participants = [currentUser.uid, ...selectedUsers];

        await db.collection('chats').doc(chatId).set({
          id: chatId,
          name: groupName,
          type: 'group',
          ownerId: currentUser.uid,
          participants: participants,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastUpdated: Date.now(),
          lastMessage: ''
        });

        // Add to all participants' chat lists
        for (const participant of participants) {
          const userChatsRef = db.collection('userChats').doc(participant);
          const userChats = await userChatsRef.get();
          if (userChats.exists) {
            await userChatsRef.update({ chats: firebase.firestore.FieldValue.arrayUnion(chatId) });
          } else {
            await userChatsRef.set({ chats: [chatId] });
          }
        }

        await loadChats();
        modal.remove();
        showToast(`Group "${groupName}" created!`);
      };

      modal.querySelector('#close-group-modal').onclick = () => modal.remove();
    }

    // Profile modal
    async function showProfileModal() {
      const userDoc = await db.collection('users').doc(currentUser.uid).get();
      const userData = userDoc.data() || {};

      const modal = document.createElement('div');
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <h3>👤 My Profile</h3>
          <div class="avatar" style="width:80px; height:80px; font-size:36px; margin:0 auto 16px;">${(userData.displayName || currentUser.email?.[0] || '?')[0].toUpperCase()}</div>
          <label>Display Name</label>
          <input type="text" id="profile-display-name" value="${userData.displayName || ''}" placeholder="Your name">
          <label>Bio</label>
          <textarea id="profile-bio" rows="3" placeholder="Tell about yourself">${userData.bio || ''}</textarea>
          <label>Chat Background</label>
          <select id="profile-bg">
            <option value="default" ${userData.bgPreference === 'default' ? 'selected' : ''}>Default Dark</option>
            <option value="gradient1" ${userData.bgPreference === 'gradient1' ? 'selected' : ''}>Purple Gradient</option>
            <option value="pattern" ${userData.bgPreference === 'pattern' ? 'selected' : ''}>Dots Pattern</option>
            <option value="galaxy" ${userData.bgPreference === 'galaxy' ? 'selected' : ''}>Galaxy</option>
          </select>
          <button id="save-profile" style="width:100%; padding:12px; background:var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer; margin-top:12px;">Save Changes</button>
          <button id="close-profile-modal" style="width:100%; padding:10px; background:#21262d; border:none; border-radius:8px; color:white; margin-top:8px; cursor:pointer;">Close</button>
        </div>
      `;

      document.body.appendChild(modal);

      modal.querySelector('#save-profile').onclick = async () => {
        const displayName = modal.querySelector('#profile-display-name').value.trim() || currentUser.email?.split('@')[0];
        const bio = modal.querySelector('#profile-bio').value;
        const bgPreference = modal.querySelector('#profile-bg').value;

        await db.collection('users').doc(currentUser.uid).update({
          displayName: displayName,
          bio: bio,
          bgPreference: bgPreference
        });

        currentUser.displayName = displayName;
        applyBackground(bgPreference);
        showToast('Profile updated!');
        modal.remove();
      };

      modal.querySelector('#close-profile-modal').onclick = () => modal.remove();
    }

    function applyBackground(bgType) {
      const container = $('messages-container');
      container.classList.remove('bg-default', 'bg-gradient1', 'bg-pattern', 'bg-galaxy');
      if (bgType === 'default') container.classList.add('bg-default');
      else if (bgType === 'gradient1') container.classList.add('bg-gradient1');
      else if (bgType === 'pattern') container.classList.add('bg-pattern');
      else if (bgType === 'galaxy') container.classList.add('bg-galaxy');
    }

    // Theme toggle
    let isDark = true;
    $('theme-toggle').onclick = () => {
      isDark = !isDark;
      document.body.classList.toggle('light', !isDark);
      $('theme-toggle').textContent = isDark ? '🌙' : '☀️';
    };

    // Auth functions
    let isLoginMode = true;

    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      $('auth-title').textContent = isLoginMode ? '🚀 WebGram Pro' : '📝 Create Account';
      $('auth-btn').textContent = isLoginMode ? 'Login' : 'Register';
      $('reg-confirm-pass').classList.toggle('hidden', isLoginMode);
      $('auth-reg-btn').style.display = isLoginMode ? 'none' : 'block';
      $('login-email').value = '';
      $('login-pass').value = '';
      $('reg-confirm-pass').value = '';
    }

    async function handleAuth() {
      const email = $('login-email').value.trim();
      const password = $('login-pass').value;
      const errorDiv = $('auth-error');

      if (!email || !password) {
        errorDiv.textContent = 'Please fill all fields';
        errorDiv.classList.add('visible');
        return;
      }

      try {
        if (isLoginMode) {
          await auth.signInWithEmailAndPassword(email, password);
          showToast('Welcome back!');
        } else {
          const confirmPass = $('reg-confirm-pass').value;
          if (password !== confirmPass) {
            errorDiv.textContent = 'Passwords do not match';
            errorDiv.classList.add('visible');
            return;
          }
          const userCred = await auth.createUserWithEmailAndPassword(email, password);
          await db.collection('users').doc(userCred.user.uid).set({
            uid: userCred.user.uid,
            email: email,
            displayName: email.split('@')[0],
            bio: '',
            bgPreference: 'default',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          showToast('Account created!');
        }
        errorDiv.classList.remove('visible');
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.add('visible');
      }
    }

    $('auth-btn').onclick = handleAuth;
    $('auth-reg-btn').onclick = handleAuth;
    $('auth-toggle').onclick = toggleAuthMode;
    $('logout-btn').onclick = () => auth.signOut();
    $('send-btn').onclick = sendMessage;
    $('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    $('new-chat-btn').onclick = showNewChatModal;
    $('create-group-btn').onclick = showCreateGroupModal;
    $('profile-btn').onclick = showProfileModal;
    $('call-btn').onclick = () => showToast('Call feature would start here');
    $('back-btn').onclick = () => {
      $('sidebar').classList.add('open');
      $('back-btn').style.display = 'none';
    };

    $('search-input').addEventListener('input', () => renderChatList());

    // Auth state listener
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        const userDoc = await db.collection('users').doc(user.uid).get();
        const userData = userDoc.data() || {};
        currentUser.displayName = userData.displayName || user.email.split('@')[0];
        applyBackground(userData.bgPreference || 'default');
        $('auth-screen').classList.add('hidden');
        $('main-ui').classList.remove('hidden');
        await loadChats();

        // Mobile sidebar handling
        if (window.innerWidth <= 768) {
          $('sidebar').classList.add('open');
        }
      } else {
        currentUser = null;
        currentChat = null;
        if (messagesUnsubscribe) messagesUnsubscribe();
        $('auth-screen').classList.remove('hidden');
        $('main-ui').classList.add('hidden');
        $('empty-chat').classList.remove('hidden');
        $('chat-view').classList.add('hidden');
      }
    });

    console.log('WebGram Pro ready!');
</script>
</body>
</html>
