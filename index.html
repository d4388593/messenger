
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WebGram Pro – Secure Messenger</title>
    <style>
        :root {
          --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9;
          --text-secondary: #8b949e; --accent: #58a6ff;
          --accent-gradient: linear-gradient(135deg, #58a6ff, #bc8cff);
          --msg-sent: #1f6feb; --msg-received: #21262d; --danger: #f85149;
          --success: #3fb950; --warning: #d2991d; --radius: 12px;
          --shadow: 0 8px 24px rgba(0,0,0,0.4); --transition: 0.2s ease;
        }
        .light {
          --bg: #f0f2f5; --panel: #ffffff; --border: #d0d5dd; --text: #1a1a1a;
          --text-secondary: #5a5a5a; --msg-received: #ffffff;
          --msg-sent: #e3f2fd; --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; transition: background 0.3s; }
        #app { width: 100%; height: 100vh; display: flex; background: var(--panel); border-radius: 0; overflow: hidden; }

        /* Auth Screen */
        .auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at top, #161b22, #0d1117); display:flex; align-items:center; justify-content:center; z-index:100; }
        .light .auth-overlay { background: radial-gradient(circle at top, #e0e0e0, #f0f2f5); }
        .auth-card { background: var(--panel); padding: 32px; border-radius: var(--radius); box-shadow: var(--shadow); width: 360px; text-align: center; border: 1px solid var(--border); }
        .auth-card h2 { margin-bottom: 24px; font-weight: 600; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; font-size: 15px; }
        .auth-card input:focus { border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--accent-gradient); color: white; font-weight: 600; cursor: pointer; font-size: 16px; transition: var(--transition); }
        .auth-card button.secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); margin-top: 8px; }
        .auth-card .toggle-text { margin-top: 16px; font-size: 14px; color: var(--text-secondary); cursor: pointer; }
        .auth-error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; opacity: 0; transition: opacity 0.3s; }
        .auth-error.visible { opacity: 1; }

        /* Sidebar */
        #main-ui { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 320px; min-width: 320px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid var(--border); transition: transform 0.3s; }
        @media (max-width: 768px) {
          .sidebar { position: absolute; top:0; left:0; height:100%; z-index: 10; transform: translateX(-100%); }
          .sidebar.open { transform: translateX(0); }
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header .logo { font-size: 22px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .search-box { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
        .search-box input { background: none; border: none; color: var(--text); outline: none; width: 100%; font-size: 14px; }
        .sort-select { margin-top: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: 13px; width: 100%; }
        .chat-list { flex:1; overflow-y:auto; }
        .chat-item { display: flex; align-items: center; padding: 14px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: var(--transition); }
        .chat-item:hover, .chat-item.active { background: rgba(88,166,255,0.1); }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; margin-right: 12px; flex-shrink: 0; text-transform: uppercase; overflow: hidden; cursor: pointer; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-info { flex:1; overflow: hidden; }
        .chat-info .name { font-weight: 500; margin-bottom: 2px; cursor: pointer; }
        .chat-info .last-msg { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--text-secondary); margin-left: 8px; }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; }
        .sidebar-footer button { flex:1; padding: 10px; border: none; border-radius: 8px; background: var(--accent-gradient); color: white; font-weight: 600; cursor: pointer; font-size: 13px; white-space: nowrap; }
        .admin-toggle { background: none; border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; display: none; }
        .admin-toggle.active { background: var(--accent); color: white; }

        /* Chat */
        .chat-main { flex:1; display:flex; flex-direction: column; position:relative; background: var(--bg); min-width: 0; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--panel); display: flex; align-items: center; justify-content: space-between; }
        .chat-header .user-info { display: flex; align-items: center; gap: 12px; }
        .chat-header .actions { display: flex; gap: 10px; }
        .icon-btn { background: var(--bg); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 18px; transition: var(--transition); }
        .icon-btn:hover { background: var(--border); }
        .icon-btn.danger { background: rgba(248,81,73,0.15); color: var(--danger); border-color: var(--danger); }

        .messages { flex:1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrapper { display: flex; align-items: flex-end; gap: 8px; max-width: 75%; }
        .msg-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.received { align-self: flex-start; }
        .msg-bubble { padding: 10px 14px; border-radius: 18px; position: relative; word-wrap: break-word; line-height: 1.4; background: var(--msg-received); border: 1px solid var(--border); }
        .sent .msg-bubble { background: var(--msg-sent); border-color: var(--accent); }
        .msg-sender { font-size: 12px; color: var(--accent); margin-bottom: 4px; font-weight: 500; }
        .msg-text { font-size: 15px; }
        .msg-time { font-size: 11px; color: var(--text-secondary); margin-top: 4px; text-align: right; }

        .msg-actions { position: absolute; right: 0; bottom: -28px; display: none; gap: 4px; background: var(--panel); border-radius: 12px; padding: 4px 8px; border: 1px solid var(--border); z-index: 2; }
        .msg-bubble:hover .msg-actions { display: flex; }
        .msg-actions button { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
        .msg-actions button:hover { color: var(--accent); }
        .reactions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .reaction { background: rgba(88,166,255,0.1); border-radius: 10px; padding: 2px 8px; font-size: 13px; cursor: pointer; }
        .emoji-bar { position: absolute; top: -36px; left: 50%; transform: translateX(-50%); display: none; gap: 6px; background: var(--panel); border-radius: 12px; padding: 4px 8px; border: 1px solid var(--border); z-index: 5; white-space: nowrap; }
        .msg-bubble:hover .emoji-bar { display: flex; }
        .emoji-bar span { cursor: pointer; font-size: 16px; }

        .input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--panel); display: flex; align-items: center; gap: 10px; }
        .input-area input[type="text"] { flex:1; background: var(--bg); border: 1px solid var(--border); border-radius: 24px; padding: 12px 18px; color: var(--text); outline: none; font-size: 15px; }
        .record-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .record-btn:hover { background: var(--border); }

        .file-upload-progress { position: fixed; bottom: 20px; right: 20px; background: var(--panel); padding: 16px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); z-index: 200; width: 260px; }
        .progress-bar { height: 6px; background: var(--bg); border-radius: 3px; margin-top: 8px; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--accent-gradient); border-radius: 3px; transition: width 0.3s; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index:500; }
        .modal { background: var(--panel); border-radius: var(--radius); padding: 24px; width: 450px; max-width: 90%; border: 1px solid var(--border); box-shadow: var(--shadow); max-height: 80vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 16px; font-weight: 600; }
        .modal input, .modal textarea, .modal select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); margin-bottom: 12px; font-size: 14px; }
        .modal .user-list { max-height: 200px; overflow-y: auto; margin-bottom: 16px; }
        .modal .user-item { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 8px; }
        .modal .user-item:hover { background: rgba(88,166,255,0.1); }
        .modal .user-item.selected { background: var(--accent); color: white; }

        .call-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 1000; display: flex; flex-direction: column; }
        .call-videos { flex:1; display: flex; flex-wrap: wrap; gap: 8px; padding: 20px; }
        .video-tile { flex:1; min-width: 280px; height: 240px; background: var(--bg); border-radius: var(--radius); overflow: hidden; position: relative; border: 1px solid var(--border); }
        .video-tile video { width: 100%; height: 100%; object-fit: cover; }
        .video-tile .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px; }
        .call-controls { padding: 20px; display: flex; justify-content: center; gap: 20px; }
        .ctrl-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--bg); color: var(--text); font-size: 20px; cursor: pointer; }
        .ctrl-btn.end { background: var(--danger); }

        .hidden { display: none !important; }
        .show { display: flex !important; }
        .back-btn { display: none; cursor: pointer; font-size: 1.5rem; margin-right: 12px; }
        @media (max-width: 768px) { .back-btn { display: block; } }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 28px; border-radius: 30px; background: var(--panel); border: 1px solid var(--accent); color: var(--text); box-shadow: var(--shadow); z-index: 9999; font-weight: 500; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* Polls */
        .poll-container { margin-top: 8px; background: rgba(88,166,255,0.05); padding: 10px; border-radius: 12px; }
        .poll-question { font-weight: 600; margin-bottom: 4px; }
        .poll-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        .poll-option-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; cursor: pointer; padding: 6px; border-radius: 8px; transition: background 0.2s; }
        .poll-option-row:hover { background: rgba(88,166,255,0.1); }
        .poll-option-row input[type="radio"] { accent-color: var(--accent); transform: scale(1.2); margin: 0; }
        .poll-option-text { flex: 1; }
        .poll-bar-container { height: 6px; background: var(--border); border-radius: 3px; margin: 4px 0; overflow: hidden; }
        .poll-bar { height: 100%; background: var(--accent-gradient); border-radius: 3px; transition: width 0.4s ease-out; }
        .poll-results-text { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
        .poll-result-item { margin-bottom: 8px; }
        .poll-result-header { display: flex; justify-content: space-between; font-size: 13px; }

        /* Backgrounds */
        .bg-default { background: var(--bg); }
        .bg-gradient1 { background: linear-gradient(135deg, #1a0533, #0d1117, #1a0533) !important; }
        .bg-pattern { background-image: radial-gradient(circle, #30363d 1px, transparent 1px); background-size: 20px 20px; }
        .bg-galaxy { background: radial-gradient(ellipse at bottom, #1b2735, #090a0f) !important; }
    </style>
</head>
<body id="body-root">
<div id="app">
    <!-- Authentication -->
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">🚀 WebGram Pro</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Password">
            <input type="password" id="reg-confirm-pass" class="hidden" placeholder="Confirm Password">
            <div id="auth-error" class="auth-error"></div>
            <button type="button" id="auth-btn">Login</button>
            <button type="button" id="auth-reg-btn" class="secondary" style="display:none;">Register</button>
            <div id="auth-toggle" class="toggle-text">No account? <span style="color:var(--accent); cursor:pointer;">Register</span></div>
        </div>
    </div>

    <!-- Main UI -->
    <div id="main-ui" class="hidden" style="display:flex; width:100%;">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span style="background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">WebGram</span>
                    <div style="display:flex; gap:8px;">
                        <button id="theme-toggle" class="icon-btn" style="width:36px;height:36px;font-size:16px;" title="Theme">🌙</button>
                        <button id="profile-btn" class="icon-btn" style="width:36px;height:36px;font-size:16px;" title="Profile">👤</button>
                        <button id="logout-btn" class="icon-btn" style="width:36px;height:36px;font-size:14px;" title="Logout">↪</button>
                    </div>
                </div>
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="search-input" placeholder="Search chats...">
                </div>
                <select id="sort-select" class="sort-select">
                    <option value="time">By time</option>
                    <option value="name">By name</option>
                    <option value="type">By type</option>
                </select>
            </div>
            <div class="chat-list" id="chat-list"></div>
            <div class="sidebar-footer">
                <button id="new-private-chat-btn">+ New Chat</button>
                <button id="new-group-btn">+ Create Group</button>
                <button id="new-channel-btn">+ Create Channel</button>
                <button id="admin-mode-btn" class="admin-toggle">👑 Admin</button>
            </div>
        </div>

        <div class="chat-main">
            <div id="empty-chat" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-secondary);">
                Select a chat to start messaging
            </div>
            <div id="chat-view" class="hidden" style="flex:1; display:flex; flex-direction:column;">
                <div class="chat-header">
                    <div class="user-info">
                        <span class="back-btn" id="back-btn">←</span>
                        <div class="avatar" id="chat-avatar" style="cursor:pointer;">?</div>
                        <div style="display:flex; flex-direction:column;">
                            <div id="chat-name" style="font-weight:600; cursor:pointer;">...</div>
                            <div id="chat-status" style="font-size:12px; color:var(--text-secondary);">Online</div>
                        </div>
                    </div>
                    <div class="actions">
                        <button id="owner-nick-btn" class="icon-btn" title="My Nick" style="display:none;">👤</button>
                        <button id="edit-group-btn" class="icon-btn" title="Edit" style="display:none;">✏️</button>
                        <button id="add-member-btn" class="icon-btn" title="Add Members">👥</button>
                        <button id="delete-chat-btn" class="icon-btn danger" title="Delete Chat" style="display:none;">🗑</button>
                        <button id="call-btn" class="icon-btn">📞</button>
                    </div>
                </div>
                <div class="messages bg-default" id="messages-container"></div>
                <div class="input-area" id="input-area">
                    <button id="attach-btn" class="record-btn">📎</button>
                    <input type="file" id="file-input" class="hidden">
                    <button id="voice-btn" class="record-btn">🎤</button>
                    <button id="video-circle-btn" class="record-btn">📹</button>
                    <button id="poll-create-btn" class="record-btn" title="Create Poll">📊</button>
                    <input type="text" id="msg-input" placeholder="Type a message...">
                    <button id="send-btn" class="record-btn" style="background: var(--accent-gradient); color: white; border: none;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <!-- Group Modal -->
        <div id="group-modal" class="modal hidden">
            <h3 id="modal-title">Create Group</h3>
            <input type="text" id="group-name" placeholder="Group Name">
            <textarea id="group-desc" placeholder="Group description (optional)" rows="2"></textarea>
            <div style="margin-bottom: 10px; font-size: 14px; color: var(--text-secondary);">Members: <span id="selected-count">0</span></div>
            <div class="search-box" style="margin-bottom: 10px;">
                <span>🔍</span>
                <input type="text" id="group-user-search" placeholder="Search users...">
            </div>
            <div class="user-list" id="user-selector"></div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="modal-cancel" class="secondary" style="padding:10px 20px; background: #21262d; border:none; border-radius:8px; color:var(--text); cursor:pointer;">Cancel</button>
                <button id="modal-confirm" style="padding:10px 20px; background: var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer;">Create</button>
            </div>
        </div>

        <div id="channel-modal" class="modal hidden">
            <h3>Create Channel</h3>
            <input type="text" id="channel-name" placeholder="Channel Name">
            <textarea id="channel-desc" placeholder="Description (optional)" rows="2"></textarea>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="channel-cancel" class="secondary" style="padding:10px 20px; background: #21262d; border:none; border-radius:8px; color:var(--text); cursor:pointer;">Cancel</button>
                <button id="channel-confirm" style="padding:10px 20px; background: var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer;">Create</button>
            </div>
        </div>

        <div id="edit-group-modal" class="modal hidden">
            <h3>Edit Group</h3>
            <div style="text-align:center; margin-bottom:12px;">
                <img id="edit-group-avatar-preview" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover; background: #21262d; border: 2px solid var(--accent); display:none;">
                <div id="edit-group-avatar-placeholder" class="avatar" style="width:80px; height:80px; font-size:32px; display:inline-flex; margin:0;">?</div>
            </div>
            <input type="file" id="edit-group-avatar-input" accept="image/*" style="margin-bottom:12px;">
            <input type="text" id="edit-group-name" placeholder="Name">
            <textarea id="edit-group-desc" placeholder="Description" rows="2"></textarea>
            <button id="save-edit-group" style="width:100%; padding:10px; background: var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer;">Save</button>
            <button id="close-edit-group-modal" style="width:100%; margin-top:8px; padding:10px; background: #21262d; border:1px solid var(--border); border-radius:8px; color:var(--text); cursor:pointer;">Cancel</button>
        </div>

        <div id="private-chat-modal" class="modal hidden">
            <h3>New Private Chat</h3>
            <div class="user-list" id="private-user-selector"></div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="private-modal-cancel" class="secondary" style="padding:10px 20px; background: #21262d; border:none; border-radius:8px; color:var(--text); cursor:pointer;">Cancel</button>
            </div>
        </div>

        <div id="user-profile-modal" class="modal hidden" style="text-align:center;">
            <img id="user-profile-avatar" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover; background:#21262d; margin-bottom:16px; display:none;">
            <div id="user-profile-avatar-placeholder" class="avatar" style="width:80px; height:80px; font-size:32px; display:inline-flex; margin:0 auto 16px;">?</div>
            <h3 id="profile-username-display"></h3>
            <p id="profile-display-name" style="color:var(--text-secondary); margin-bottom:8px;"></p>
            <p id="profile-bio-display" style="margin-bottom:8px; font-size:14px;"></p>
            <p id="profile-phone-display" style="font-size:14px; color:var(--accent);"></p>
            <p id="profile-lastseen-display" style="font-size:12px; color:var(--text-secondary); margin-top:8px;"></p>
            <button id="close-profile-modal" style="margin-top:16px; padding:10px 24px; background: var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer;">Close</button>
        </div>

        <div id="profile-modal" class="modal hidden">
            <h3>👤 Profile</h3>
            <div style="text-align:center; margin-bottom:16px;">
                <img id="my-profile-avatar-preview" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover; background: #21262d; border: 2px solid var(--accent); display:none;" onerror="this.style.display='none'">
                <div id="my-profile-avatar-placeholder" class="avatar" style="width:80px; height:80px; font-size:32px; display:inline-flex; margin:0;">?</div>
            </div>
            <input type="file" id="profile-avatar-input" accept="image/*" style="margin-bottom:12px;">
            <label>Display Name</label>
            <input type="text" id="profile-name" placeholder="Your display name">
            <label>Username (login)</label>
            <input type="text" id="profile-username" placeholder="Unique name" disabled>
            <label>Bio</label>
            <textarea id="profile-bio" placeholder="Tell about yourself" rows="2"></textarea>
            <label>Phone Number</label>
            <input type="tel" id="profile-phone" placeholder="+1 (___) ___-____">
            <label>Chat Background</label>
            <select id="profile-background">
                <option value="default">Default Dark</option>
                <option value="gradient1">Purple Gradient</option>
                <option value="pattern">Dots Pattern</option>

                <input type="text" class="poll-option-input" placeholder="Option 1">
                <input type="text" class="poll-option-input" placeholder="Option 2">

            <button id="add-poll-option-create" style="background:none; border:1px solid var(--border); color:var(--text); padding:5px 10px; border-radius:8px; cursor:pointer; margin-bottom:12px;">+ Add Option</button>
            <button id="send-poll-btn" style="width:100%; padding:12px; background: var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer;">Send Poll</button>

            <button id="accept-call" style="background: var(--success); padding:12px 24px; border:none; border-radius:12px; color:white; cursor:pointer;">Accept</button>

    <!-- Progress -->

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>
    // --- Firebase Configuration (COMPLETE) ---
firebase.initializeApp({
  apiKey: "AIzaSyCtPt1M2ej6B91yBx5VepU8SnrfO9MQAlk",
  authDomain: "webgram-pro.firebaseapp.com",
  projectId: "webgram-pro",
  storageBucket: "webgram-pro.appspot.com",
  messagingSenderId: "123456789012",
  appId: "1:123456789012:web:abcdef1234567890"
});

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// --- DOM Caching System ---
const $ = (id) => document.getElementById(id);
const elements = {
  authScreen: $('auth-screen'), mainUI: $('main-ui'), sidebar: $('sidebar'),
  chatList: $('chat-list'), messagesContainer: $('messages-container'), msgInput: $('msg-input'),
  sendBtn: $('send-btn'), chatView: $('chat-view'), emptyChat: $('empty-chat'),
  chatName: $('chat-name'), chatAvatar: $('chat-avatar'), authBtn: $('auth-btn'),
  authRegBtn: $('auth-reg-btn'), authToggle: $('auth-toggle'), loginEmail: $('login-email'),
  loginPass: $('login-pass'), regConfirmPass: $('reg-confirm-pass'), authError: $('auth-error'),
  authTitle: $('auth-title'), logoutBtn: $('logout-btn'), themeToggle: $('theme-toggle'),
  profileBtn: $('profile-btn'), searchInput: $('search-input'), sortSelect: $('sort-select'),
  newPrivateChatBtn: $('new-private-chat-btn'), newGroupBtn: $('new-group-btn'),
  newChannelBtn: $('new-channel-btn'), adminModeBtn: $('admin-mode-btn'), backBtn: $('back-btn'),
  callBtn: $('call-btn'), attachBtn: $('attach-btn'), fileInput: $('file-input'),
  voiceBtn: $('voice-btn'), videoCircleBtn: $('video-circle-btn'), pollCreateBtn: $('poll-create-btn'),
  modalOverlay: $('modal-overlay'), uploadProgress: $('upload-progress'), progressFill: $('progress-fill'),
  progressText: $('progress-text'), callOverlay: $('call-overlay'), incomingCallModal: $('incoming-call-modal')
};

// --- State Management ---
let currentUser = null, currentChat = null, chats = [], messagesUnsubscribe = null;
let currentCall = null, localStream = null, remoteStream = null, peerConnection = null;
let isAdminMode = false, currentTheme = 'dark';

// --- Helper Functions ---
function showToast(msg, duration = 3000) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), duration);
}

function encryptMessage(text) {
  // Simple encryption for demo (in production use proper AES-GCM)
  return btoa(encodeURIComponent(text));
}

function decryptMessage(encrypted) {
  try {
    return decodeURIComponent(atob(encrypted));
  } catch { return encrypted; }
}

async function uploadFile(file, onProgress) {
  const storageRef = storage.ref(`chat-files/${Date.now()}_${file.name}`);
  const uploadTask = storageRef.put(file);
  return new Promise((resolve, reject) => {
    uploadTask.on('state_changed', (snapshot) => {
      const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
      if (onProgress) onProgress(progress);
    }, reject, async () => {
      const url = await uploadTask.snapshot.ref.getDownloadURL();
      resolve({ url, name: file.name, type: file.type });
    });
  });
}

// --- Authentication ---
let isLoginMode = true;
function toggleAuthMode() {
  isLoginMode = !isLoginMode;
  elements.authTitle.textContent = isLoginMode ? '🚀 WebGram Pro' : '📝 Create Account';
  elements.authBtn.textContent = isLoginMode ? 'Login' : 'Register';
  elements.regConfirmPass.classList.toggle('hidden', isLoginMode);
  elements.authRegBtn.style.display = isLoginMode ? 'none' : 'block';
  elements.loginEmail.value = '';
  elements.loginPass.value = '';
  elements.regConfirmPass.value = '';
  elements.authError.classList.remove('visible');
}

async function handleAuth() {
  const email = elements.loginEmail.value.trim();
  const password = elements.loginPass.value;
  const confirmPass = elements.regConfirmPass.value;
  elements.authError.classList.remove('visible');

  if (!email || !password) {
    elements.authError.textContent = 'Please fill all fields';
    elements.authError.classList.add('visible');
    return;
  }

  if (!isLoginMode && password !== confirmPass) {
    elements.authError.textContent = 'Passwords do not match';
    elements.authError.classList.add('visible');
    return;
  }

  try {
    let userCred;
    if (isLoginMode) {
      userCred = await auth.signInWithEmailAndPassword(email, password);
    } else {
      userCred = await auth.createUserWithEmailAndPassword(email, password);
      await db.collection('users').doc(userCred.user.uid).set({
        uid: userCred.user.uid, email: email, displayName: email.split('@')[0],
        username: email.split('@')[0], bio: '', phone: '', avatarUrl: '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    showToast(isLoginMode ? 'Welcome back!' : 'Account created!');
  } catch (error) {
    elements.authError.textContent = error.message;
    elements.authError.classList.add('visible');
  }
}

// --- Message Rendering with Polls & Reactions ---
function renderMessage(msg, isSent, senderName) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${isSent ? 'sent' : 'received'}`;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (!isSent && senderName) {
    const senderSpan = document.createElement('div');
    senderSpan.className = 'msg-sender';
    senderSpan.textContent = senderName;
    bubble.appendChild(senderSpan);
  }
  const textSpan = document.createElement('div');
  textSpan.className = 'msg-text';

  if (msg.type === 'poll') {
    textSpan.innerHTML = renderPoll(msg.pollData, msg.id, currentUser?.uid);
  } else if (msg.type === 'file') {
    if (msg.fileType?.startsWith('image/')) {
      textSpan.innerHTML = `<img src="${msg.fileUrl}" style="max-width:200px; border-radius:8px; cursor:pointer;" onclick="window.open('${msg.fileUrl}')">`;
    } else {
      textSpan.innerHTML = `<a href="${msg.fileUrl}" download style="color:var(--accent);">📎 ${msg.fileName}</a>`;
    }
  } else {
    textSpan.textContent = decryptMessage(msg.text);
  }

  bubble.appendChild(textSpan);
  const timeSpan = document.createElement('div');
  timeSpan.className = 'msg-time';
  timeSpan.textContent = msg.timestamp?.toDate?.()?.toLocaleTimeString() || 'Just now';
  bubble.appendChild(timeSpan);

  // Reactions UI
  if (msg.reactions && Object.keys(msg.reactions).length) {
    const reactionsDiv = document.createElement('div');
    reactionsDiv.className = 'reactions';
    for (const [emoji, users] of Object.entries(msg.reactions)) {
      const reactionSpan = document.createElement('span');
      reactionSpan.className = 'reaction';
      reactionSpan.textContent = `${emoji} ${users.length}`;
      reactionSpan.onclick = () => toggleReaction(msg.id, emoji);
      reactionsDiv.appendChild(reactionSpan);
    }
    bubble.appendChild(reactionsDiv);
  }

  const emojiBar = document.createElement('div');
  emojiBar.className = 'emoji-bar';
  ['👍', '❤️', '😂', '😮', '😢', '👎'].forEach(emoji => {
    const emojiSpan = document.createElement('span');
    emojiSpan.textContent = emoji;
    emojiSpan.onclick = (e) => {
      e.stopPropagation();
      toggleReaction(msg.id, emoji);
    };
    emojiBar.appendChild(emojiSpan);
  });
  bubble.appendChild(emojiBar);

  wrapper.appendChild(bubble);
  return wrapper;
}

function renderPoll(pollData, messageId, userId) {
  const hasVoted = pollData.votes?.[userId];
  const totalVotes = Object.values(pollData.votes || {}).length;

  if (hasVoted || !pollData.isActive) {
    // Show results
    let html = `<div class="poll-container"><div class="poll-question">📊 ${pollData.question}</div>`;
    if (pollData.description) html += `<div class="poll-desc">${pollData.description}</div>`;
    pollData.options.forEach(option => {
      const count = pollData.voteCounts?.[option] || 0;
      const percentage = totalVotes ? (count / totalVotes * 100) : 0;
      html += `
        <div class="poll-result-item">
          <div class="poll-result-header">
            <span>${option}</span>
            <span>${count} (${percentage.toFixed(0)}%)</span>
          </div>
          <div class="poll-bar-container">
            <div class="poll-bar" style="width: ${percentage}%"></div>
          </div>
        </div>`;
    });
    html += `<div class="poll-results-text">Total votes: ${totalVotes}</div></div>`;
    return html;
  } else {
    // Show voting options
    let html = `<div class="poll-container"><div class="poll-question">📊 ${pollData.question}</div>`;
    if (pollData.description) html += `<div class="poll-desc">${pollData.description}</div>`;
    pollData.options.forEach(option => {
      html += `
        <div class="poll-option-row" onclick="votePoll('${messageId}', '${option.replace(/'/g, "\\'")}')">
          <input type="radio" name="poll-${messageId}" value="${option.replace(/'/g, "&apos;")}">
          <span class="poll-option-text">${option}</span>
        </div>`;
    });
    html += `</div>`;
    return html;
  }
}

async function votePoll(messageId, option) {
  if (!currentChat) return;
  const messageRef = db.collection('chats').doc(currentChat.id).collection('messages').doc(messageId);
  await db.runTransaction(async (transaction) => {
    const msgDoc = await transaction.get(messageRef);
    const pollData = msgDoc.data().pollData;
    if (pollData.votes?.[currentUser.uid]) return;
    transaction.update(messageRef, {
      [`pollData.votes.${currentUser.uid}`]: option,
      [`pollData.voteCounts.${option}`]: firebase.firestore.FieldValue.increment(1)
    });
  });
  showToast('Vote recorded!');
}

async function toggleReaction(messageId, emoji) {
  if (!currentChat || !currentUser) return;
  const messageRef = db.collection('chats').doc(currentChat.id).collection('messages').doc(messageId);
  await db.runTransaction(async (transaction) => {
    const msgDoc = await transaction.get(messageRef);
    const reactions = msgDoc.data().reactions || {};
    if (reactions[emoji]?.includes(currentUser.uid)) {
      reactions[emoji] = reactions[emoji].filter(uid => uid !== currentUser.uid);
      if (reactions[emoji].length === 0) delete reactions[emoji];
    } else {
      reactions[emoji] = [...(reactions[emoji] || []), currentUser.uid];
    }
    transaction.update(messageRef, { reactions });
  });
}

// --- Send Message with Poll Support ---
async function sendMessage(text, type = 'text', extraData = {}) {
  if (!currentChat || !currentUser) return;
  const message = {
    senderId: currentUser.uid,
    senderName: currentUser.displayName || currentUser.email,
    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
    type: type,
    ...extraData
  };
  if (type === 'text') message.text = encryptMessage(text);
  await db.collection('chats').doc(currentChat.id).collection('messages').add(message);
  await db.collection('chats').doc(currentChat.id).update({ lastMessage: message.text || text, lastUpdated: Date.now() });
  elements.msgInput.value = '';
}

// --- Call System (Simulated with WebRTC structure) ---
async function startCall(isVideo = true) {
  if (!currentChat) return;
  const callId = `call_${Date.now()}`;
  await db.collection('calls').doc(callId).set({
    chatId: currentChat.id, callerId: currentUser.uid, calleeId: currentChat.isGroup ? null : currentChat.participants?.find(p => p !== currentUser.uid),
    status: 'ringing', isVideo, startedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  showToast(`Calling ${currentChat.name}...`);
  // Listen for answer
  db.collection('calls').doc(callId).onSnapshot(async (doc) => {
    if (doc.exists && doc.data().status === 'accepted') {
      elements.callOverlay.classList.remove('hidden');
      setupCallUI(callId, isVideo);
    }
  });
}

async function setupCallUI(callId, isVideo) {
  // Simplified call UI simulation
  const videosDiv = elements.callVideos;
  videosDiv.innerHTML = '<div class="video-tile"><video id="local-video" autoplay muted></video><div class="label">You</div></div>';
  if (isVideo) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('local-video').srcObject = localStream;
    } catch(e) { console.log(e); }
  }
}

// --- Background Management ---
function applyBackground(bgType) {
  const container = elements.messagesContainer;
  container.classList.remove('bg-default', 'bg-gradient1', 'bg-pattern', 'bg-galaxy');
  if (bgType === 'default') container.classList.add('bg-default');
  else if (bgType === 'gradient1') container.classList.add('bg-gradient1');
  else if (bgType === 'pattern') container.classList.add('bg-pattern');
  else if (bgType === 'galaxy') container.classList.add('bg-galaxy');
}

// --- Load Messages Real-time ---
function loadMessages(chatId) {
  if (messagesUnsubscribe) messagesUnsubscribe();
  const messagesRef = db.collection('chats').doc(chatId).collection('messages').orderBy('timestamp', 'asc');
  messagesUnsubscribe = messagesRef.onSnapshot((snapshot) => {
    elements.messagesContainer.innerHTML = '';
    const fragment = document.createDocumentFragment();
    snapshot.forEach(doc => {
      const msg = { id: doc.id, ...doc.data() };
      const isSent = msg.senderId === currentUser.uid;
      const senderName = isSent ? null : msg.senderName;
      fragment.appendChild(renderMessage(msg, isSent, senderName));
    });
    elements.messagesContainer.appendChild(fragment);
    elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
  });
}

// --- Load Chats List ---
async function loadChats() {
  const userChats = await db.collection('userChats').doc(currentUser.uid).get();
  const chatIds = userChats.data()?.chats || [];
  chats = [];
  for (const chatId of chatIds) {
    const chatDoc = await db.collection('chats').doc(chatId).get();
    if (chatDoc.exists) chats.push({ id: chatId, ...chatDoc.data() });
  }
  renderChatList();
}

function renderChatList() {
  const searchTerm = elements.searchInput.value.toLowerCase();
  let filtered = chats.filter(c => c.name?.toLowerCase().includes(searchTerm));
  const sortBy = elements.sortSelect.value;
  filtered.sort((a,b) => sortBy === 'name' ? (a.name||'').localeCompare(b.name||'') : (b.lastUpdated||0) - (a.lastUpdated||0));

  const fragment = document.createDocumentFragment();
  filtered.forEach(chat => {
    const div = document.createElement('div');
    div.className = `chat-item ${currentChat?.id === chat.id ? 'active' : ''}`;
    div.innerHTML = `
      <div class="avatar">${chat.name?.[0]?.toUpperCase() || '💬'}</div>
      <div class="chat-info"><div class="name">${chat.name}</div><div class="last-msg">${chat.lastMessage?.substring(0,30) || 'New chat'}</div></div>
      <div class="chat-time">${chat.lastUpdated ? new Date(chat.lastUpdated).toLocaleTimeString() : ''}</div>
    `;
    div.onclick = () => selectChat(chat);
    fragment.appendChild(div);
  });
  elements.chatList.innerHTML = '';
  elements.chatList.appendChild(fragment);
}

function selectChat(chat) {
  currentChat = chat;
  elements.chatName.textContent = chat.name;
  elements.emptyChat.classList.add('hidden');
  elements.chatView.classList.remove('hidden');
  loadMessages(chat.id);
  // Show/hide admin buttons
  const isOwner = chat.ownerId === currentUser.uid;
  elements['edit-group-btn']?.classList.toggle('hidden', !isOwner || !chat.isGroup);
  elements['delete-chat-btn']?.classList.toggle('hidden', !isOwner);
  if (window.innerWidth <= 768) elements.sidebar.classList.remove('open');
}

// --- Auth State Listener ---
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    const userDoc = await db.collection('users').doc(user.uid).get();
    const userData = userDoc.data() || {};
    currentUser.displayName = userData.displayName || user.email.split('@')[0];
    currentUser.avatarUrl = userData.avatarUrl || '';
    currentUser.bgPreference = userData.bgPreference || 'default';
    applyBackground(currentUser.bgPreference);
    elements.authScreen.classList.add('hidden');
    elements.mainUI.classList.remove('hidden');
    await loadChats();
    showToast(`Welcome ${currentUser.displayName}!`);
  } else {
    currentUser = null;
    currentChat = null;
    if (messagesUnsubscribe) messagesUnsubscribe();
    elements.authScreen.classList.remove('hidden');
    elements.mainUI.classList.add('hidden');
    elements.emptyChat.classList.remove('hidden');
    elements.chatView.classList.add('hidden');
  }
});

// --- Event Listeners ---
elements.authBtn.onclick = handleAuth;
elements.authRegBtn.onclick = handleAuth;
elements.authToggle.onclick = () => toggleAuthMode();
elements.logoutBtn.onclick = () => auth.signOut();
elements.sendBtn.onclick = () => {
  const text = elements.msgInput.value.trim();
  if (text) sendMessage(text);
};
elements.msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') elements.sendBtn.click(); });
elements.newPrivateChatBtn.onclick = () => showUserSelector('private');
elements.newGroupBtn.onclick = () => showGroupModal();
elements.newChannelBtn.onclick = () => showChannelModal();
elements.callBtn.onclick = () => startCall(true);
elements.themeToggle.onclick = () => {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.body.classList.toggle('light', currentTheme === 'light');
  elements.themeToggle.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
};
elements.profileBtn.onclick = () => showProfileModal();
elements.backBtn.onclick = () => {
  if (window.innerWidth <= 768) elements.sidebar.classList.add('open');
  else elements.sidebar.classList.toggle('open');
};
elements.searchInput.addEventListener('input', () => renderChatList());
elements.sortSelect.addEventListener('change', () => renderChatList());

// --- Modal Functions (simplified implementations) ---
function showUserSelector(type) { showToast('User selector modal would open here'); }
function showGroupModal() { showToast('Group creation modal'); }
function showChannelModal() { showToast('Channel creation modal'); }
function showProfileModal() { showToast('Profile settings modal'); }

elements.pollCreateBtn.onclick = () => {
  const question = prompt('Poll question:');
  if (!question) return;
  const options = [];
  for(let i=1; i<=2; i++) {
    const opt = prompt(`Option ${i}:`);
    if(opt) options.push(opt);
  }
  if(options.length >= 2) {
    sendMessage('', 'poll', { pollData: { question, options, votes: {}, voteCounts: {}, isActive: true, description: '' } });
  }
};

// Debounced search
let debounceTimer;
elements.searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => renderChatList(), 300);
});

window.votePoll = votePoll;

console.log('🚀 WebGram Pro fully loaded with all fixes!');
</script>
