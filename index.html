<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vortex Messenger</title>

    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />

    <style>
        :root {
          --bg: #0f172a;
          --panel: #111827;
          --panel-2: #1f2937;
          --text: #f9fafb;
          --muted: #9ca3af;
          --primary: #6366f1;
          --primary-2: #818cf8;
          --danger: #ef4444;
          --success: #22c55e;
          --border: rgba(255, 255, 255, 0.08);
          --message-me: #4f46e5;
          --message-other: #374151;
        }

        body.light {
          --bg: #f3f4f6;
          --panel: #ffffff;
          --panel-2: #e5e7eb;
          --text: #111827;
          --muted: #6b7280;
          --primary: #4f46e5;
          --primary-2: #6366f1;
          --border: rgba(0, 0, 0, 0.08);
          --message-me: #6366f1;
          --message-other: #e5e7eb;
        }

        * {
          box-sizing: border-box;
        }

        body {
          margin: 0;
          font-family: Inter, Arial, sans-serif;
          background: var(--bg);
          color: var(--text);
          height: 100vh;
          overflow: hidden;
        }

        button,
        input {
          font-family: inherit;
        }

        .hidden {
          display: none !important;
        }

        .app {
          display: grid;
          grid-template-columns: 340px 1fr;
          height: 100vh;
          background: var(--bg);
        }

        .auth-page {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 24px;
          background:
            radial-gradient(circle at top left, rgba(99, 102, 241, 0.28), transparent 35%),
            radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.15), transparent 35%),
            var(--bg);
        }

        .auth-card {
          width: 100%;
          max-width: 420px;
          background: var(--panel);
          border: 1px solid var(--border);
          border-radius: 24px;
          padding: 28px;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .logo {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 24px;
        }

        .logo-icon {
          width: 46px;
          height: 46px;
          border-radius: 16px;
          background: linear-gradient(135deg, var(--primary), #06b6d4);
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          font-size: 21px;
        }

        .logo h1 {
          margin: 0;
          font-size: 26px;
        }

        .logo p {
          margin: 2px 0 0;
          color: var(--muted);
          font-size: 13px;
        }

        .field {
          margin-bottom: 14px;
        }

        .field label {
          display: block;
          font-size: 13px;
          color: var(--muted);
          margin-bottom: 7px;
        }

        .field input {
          width: 100%;
          padding: 13px 14px;
          border-radius: 14px;
          border: 1px solid var(--border);
          background: var(--panel-2);
          color: var(--text);
          outline: none;
        }

        .field input:focus {
          border-color: var(--primary);
        }

        .btn {
          border: 0;
          border-radius: 14px;
          padding: 12px 15px;
          color: white;
          background: var(--primary);
          cursor: pointer;
          transition: 0.15s;
          font-weight: 600;
        }

        .btn:hover {
          background: var(--primary-2);
          transform: translateY(-1px);
        }

        .btn.secondary {
          background: var(--panel-2);
          color: var(--text);
          border: 1px solid var(--border);
        }

        .btn.danger {
          background: var(--danger);
        }

        .btn.success {
          background: var(--success);
        }

        .btn.full {
          width: 100%;
          margin-top: 8px;
        }

        .auth-switch {
          color: var(--muted);
          text-align: center;
          margin-top: 16px;
          font-size: 14px;
        }

        .auth-switch button {
          background: transparent;
          color: var(--primary-2);
          border: 0;
          cursor: pointer;
          font-weight: 700;
        }

        .error {
          margin-top: 12px;
          color: #fecaca;
          background: rgba(239, 68, 68, 0.14);
          border: 1px solid rgba(239, 68, 68, 0.25);
          border-radius: 12px;
          padding: 10px;
          font-size: 13px;
        }

        .sidebar {
          background: var(--panel);
          border-right: 1px solid var(--border);
          display: flex;
          flex-direction: column;
          min-width: 0;
        }

        .sidebar-top {
          padding: 16px;
          border-bottom: 1px solid var(--border);
        }

        .user-row {
          display: flex;
          align-items: center;
          gap: 12px;
          margin-bottom: 14px;
        }

        .avatar {
          width: 44px;
          height: 44px;
          border-radius: 50%;
          background: linear-gradient(135deg, var(--primary), #22c55e);
          color: white;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: 800;
          flex: 0 0 auto;
          overflow: hidden;
        }

        .avatar img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        .user-meta {
          min-width: 0;
          flex: 1;
        }

        .user-name {
          font-weight: 800;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .user-code {
          color: var(--muted);
          font-size: 12px;
          margin-top: 2px;
        }

        .top-actions {
          display: flex;
          gap: 8px;
        }

        .icon-btn {
          width: 40px;
          height: 40px;
          border-radius: 13px;
          border: 1px solid var(--border);
          background: var(--panel-2);
          color: var(--text);
          cursor: pointer;
        }

        .search-box {
          display: flex;
          gap: 8px;
          margin-top: 14px;
        }

        .search-box input {
          flex: 1;
          min-width: 0;
          padding: 12px;
          border-radius: 13px;
          border: 1px solid var(--border);
          background: var(--panel-2);
          color: var(--text);
          outline: none;
        }

        .tabs {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 6px;
          padding: 10px;
          border-bottom: 1px solid var(--border);
        }

        .tab {
          border: 0;
          border-radius: 12px;
          padding: 10px 6px;
          background: transparent;
          color: var(--muted);
          cursor: pointer;
          font-weight: 700;
          font-size: 13px;
        }

        .tab.active {
          background: var(--panel-2);
          color: var(--text);
        }

        .list {
          flex: 1;
          overflow-y: auto;
          padding: 8px;
        }

        .item {
          padding: 12px;
          border-radius: 16px;
          display: flex;
          gap: 12px;
          align-items: center;
          cursor: pointer;
          border: 1px solid transparent;
        }

        .item:hover,
        .item.active {
          background: var(--panel-2);
          border-color: var(--border);
        }

        .item-body {
          flex: 1;
          min-width: 0;
        }

        .item-title {
          font-weight: 800;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }

        .item-sub {
          font-size: 13px;
          color: var(--muted);
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          margin-top: 3px;
        }

        .item-actions {
          display: flex;
          gap: 6px;
        }

        .small-btn {
          border: 0;
          border-radius: 10px;
          padding: 8px 9px;
          cursor: pointer;
          color: white;
          background: var(--primary);
        }

        .small-btn.danger {
          background: var(--danger);
        }

        .small-btn.success {
          background: var(--success);
        }

        .chat {
          display: flex;
          flex-direction: column;
          min-width: 0;
          background:
            radial-gradient(circle at top right, rgba(99, 102, 241, 0.12), transparent 35%),
            var(--bg);
        }

        .chat-header {
          height: 74px;
          padding: 14px 18px;
          background: var(--panel);
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: center;
          gap: 12px;
        }

        .chat-title {
          font-weight: 900;
        }

        .chat-sub {
          color: var(--muted);
          font-size: 13px;
          margin-top: 2px;
        }

        .messages {
          flex: 1;
          overflow-y: auto;
          padding: 18px;
          display: flex;
          flex-direction: column;
          gap: 10px;
        }

        .message {
          max-width: min(560px, 80%);
          padding: 11px 13px;
          border-radius: 17px;
          line-height: 1.35;
          word-break: break-word;
          position: relative;
        }

        .message.me {
          align-self: flex-end;
          background: var(--message-me);
          color: white;
          border-bottom-right-radius: 6px;
        }

        .message.other {
          align-self: flex-start;
          background: var(--message-other);
          color: var(--text);
          border-bottom-left-radius: 6px;
        }

        .message-time {
          opacity: 0.75;
          font-size: 11px;
          margin-top: 5px;
          text-align: right;
        }

        .composer {
          padding: 14px;
          background: var(--panel);
          border-top: 1px solid var(--border);
          display: flex;
          gap: 10px;
        }

        .composer input {
          flex: 1;
          min-width: 0;
          padding: 14px;
          border-radius: 16px;
          border: 1px solid var(--border);
          background: var(--panel-2);
          color: var(--text);
          outline: none;
        }

        .empty {
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          color: var(--muted);
          text-align: center;
          padding: 24px;
        }

        .empty i {
          display: block;
          font-size: 42px;
          margin-bottom: 12px;
          color: var(--primary-2);
        }

        .mobile-menu {
          display: none;
        }

        @media (max-width: 800px) {
          .app {
            grid-template-columns: 1fr;
          }

          .sidebar {
            position: fixed;
            inset: 0 auto 0 0;
            width: 88%;
            max-width: 340px;
            z-index: 5;
            transform: translateX(-105%);
            transition: 0.2s;
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.35);
          }

          .sidebar.open {
            transform: translateX(0);
          }

          .mobile-menu {
            display: inline-flex;
            align-items: center;
            justify-content: center;
          }

          .message {
            max-width: 88%;
          }
        }
    </style>
</head>

<body>
<div id="authPage" class="auth-page">
    <div class="auth-card">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-bolt"></i>
            </div>
            <div>
                <h1>Vortex</h1>
                <p>Messenger на Firebase</p>
            </div>
        </div>

        <div id="loginBox">
            <div class="field">
                <label>Email</label>
                <input id="loginEmail" type="email" placeholder="you@example.com" />
            </div>

            <div class="field">
                <label>Пароль</label>
                <input id="loginPassword" type="password" placeholder="••••••••" />
            </div>

            <button id="loginBtn" class="btn full">
                Войти
            </button>

            <button id="googleBtn1" class="btn secondary full">
                <i class="fab fa-google"></i>
                Войти через Google
            </button>

            <div class="auth-switch">
                Нет аккаунта?
                <button id="showRegisterBtn">Создать</button>
            </div>
        </div>

        <div id="registerBox" class="hidden">
            <div class="field">
                <label>Имя</label>
                <input id="registerName" type="text" placeholder="Твоё имя" />
            </div>

            <div class="field">
                <label>Email</label>
                <input id="registerEmail" type="email" placeholder="you@example.com" />
            </div>

            <div class="field">
                <label>Пароль</label>
                <input id="registerPassword" type="password" placeholder="Минимум 6 символов" />
            </div>

            <button id="registerBtn" class="btn full">
                Зарегистрироваться
            </button>

            <button id="googleBtn2" class="btn secondary full">
                <i class="fab fa-google"></i>
                Войти через Google
            </button>

            <div class="auth-switch">
                Уже есть аккаунт?
                <button id="showLoginBtn">Войти</button>
            </div>
        </div>

        <div id="authError" class="error hidden"></div>
    </div>
</div>

<div id="mainApp" class="app hidden">
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-top">
            <div class="user-row">
                <div id="myAvatar" class="avatar">V</div>
                <div class="user-meta">
                    <div id="myName" class="user-name">Загрузка...</div>
                    <div id="myCode" class="user-code">Код: ------</div>
                </div>

                <button id="themeBtn" class="icon-btn" title="Тема">
                    <i class="fas fa-moon"></i>
                </button>

                <button id="logoutBtn" class="icon-btn" title="Выйти">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>

            <div class="search-box">
                <input id="friendCodeInput" maxlength="6" placeholder="Код друга" />
                <button id="addFriendBtn" class="icon-btn" title="Добавить">
                    <i class="fas fa-user-plus"></i>
                </button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="chats">
                Чаты
            </button>
            <button class="tab" data-tab="friends">
                Друзья
            </button>
            <button class="tab" data-tab="requests">
                Заявки
            </button>
        </div>

        <div id="list" class="list"></div>
    </aside>

    <main class="chat">
        <div id="emptyChat" class="empty">
            <div>
                <i class="fas fa-comments"></i>
                <h2>Выбери чат</h2>
                <p>Добавь друга по 6-значному коду и начни переписку.</p>
            </div>
        </div>

        <div id="chatPanel" class="hidden" style="height:100%; display:flex; flex-direction:column;">
            <div class="chat-header">
                <button id="mobileMenuBtn" class="icon-btn mobile-menu">
                    <i class="fas fa-bars"></i>
                </button>

                <div id="chatAvatar" class="avatar">?</div>

                <div>
                    <div id="chatName" class="chat-title">Чат</div>
                    <div id="chatInfo" class="chat-sub">online</div>
                </div>
            </div>

            <div id="messages" class="messages"></div>

            <div class="composer">
                <input id="messageInput" placeholder="Сообщение..." />
                <button id="sendBtn" class="btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      GoogleAuthProvider,
      signInWithPopup,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      collection,
      query,
      where,
      getDocs,
      onSnapshot,
      addDoc,
      serverTimestamp,
      orderBy,
      arrayUnion,
      arrayRemove,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    /*
      ВАЖНО:
      1. Замени firebaseConfig на config из Firebase Console.
      2. Включи Authentication: Email/Password и Google.
      3. Создай Firestore Database.
      4. Добавь домен сайта в Authentication > Settings > Authorized domains.
    */

    const firebaseConfig = {
      apiKey: "ВСТАВЬ_СВОЙ_API_KEY",
      authDomain: "my-messenger-d1622.firebaseapp.com",
      projectId: "my-messenger-d1622",
      storageBucket: "my-messenger-d1622.appspot.com",
      messagingSenderId: "ВСТАВЬ_MESSAGING_SENDER_ID",
      appId: "ВСТАВЬ_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    const $ = (id) => document.getElementById(id);

    const authPage = $("authPage");
    const mainApp = $("mainApp");
    const authError = $("authError");

    const loginBox = $("loginBox");
    const registerBox = $("registerBox");

    const list = $("list");
    const emptyChat = $("emptyChat");
    const chatPanel = $("chatPanel");
    const messagesEl = $("messages");

    let currentUser = null;
    let currentProfile = null;
    let currentTab = "chats";
    let selectedChatId = null;
    let selectedFriend = null;

    let unsubscribeProfile = null;
    let unsubscribeList = null;
    let unsubscribeMessages = null;

    function showError(message) {
      authError.textContent = message;
      authError.classList.remove("hidden");
    }

    function clearError() {
      authError.textContent = "";
      authError.classList.add("hidden");
    }

    function initials(nameOrEmail) {
      const text = nameOrEmail || "V";
      return text.trim()[0]?.toUpperCase() || "V";
    }

    function formatTime(date) {
      if (!date) return "";
      return new Intl.DateTimeFormat("ru-RU", {
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function normalizeCode(code) {
      return String(code || "").replace(/\D/g, "").slice(0, 6);
    }

    function createUserCode() {
      return String(Math.floor(100000 + Math.random() * 900000));
    }

    async function generateUniqueUserCode() {
      for (let i = 0; i < 20; i++) {
        const code = createUserCode();
        const q = query(collection(db, "users"), where("code", "==", code));
        const snap = await getDocs(q);
        if (snap.empty) return code;
      }

      throw new Error("Не получилось создать уникальный код. Попробуй ещё раз.");
    }

    async function ensureUserProfile(user, customName = "") {
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);

      if (snap.exists()) {
        return snap.data();
      }

      const name =
        customName ||
        user.displayName ||
        user.email?.split("@")[0] ||
        "Vortex User";

      const code = await generateUniqueUserCode();

      const profile = {
        uid: user.uid,
        name,
        email: user.email || "",
        photoURL: user.photoURL || "",
        code,
        friends: [],
        chats: [],
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      };

      await setDoc(ref, profile);
      return profile;
    }

    async function findUserByCode(code) {
      const q = query(collection(db, "users"), where("code", "==", code));
      const snap = await getDocs(q);

      if (snap.empty) return null;

      const docSnap = snap.docs[0];
      return {
        id: docSnap.id,
        ...docSnap.data()
      };
    }

    function getPrivateChatId(uid1, uid2) {
      return [uid1, uid2].sort().join("_");
    }

    async function createOrGetPrivateChat(friendProfile) {
      const chatId = getPrivateChatId(currentUser.uid, friendProfile.uid);
      const chatRef = doc(db, "chats", chatId);
      const chatSnap = await getDoc(chatRef);

      if (!chatSnap.exists()) {
        await setDoc(chatRef, {
          id: chatId,
          type: "private",
          members: [currentUser.uid, friendProfile.uid],
          memberNames: {
            [currentUser.uid]: currentProfile.name,
            [friendProfile.uid]: friendProfile.name
          },
          lastMessage: "",
          lastMessageAt: serverTimestamp(),
          createdAt: serverTimestamp()
        });
      }

      const myRef = doc(db, "users", currentUser.uid);
      const friendRef = doc(db, "users", friendProfile.uid);

      await updateDoc(myRef, {
        chats: arrayUnion(chatId),
        updatedAt: serverTimestamp()
      });

      await updateDoc(friendRef, {
        chats: arrayUnion(chatId),
        updatedAt: serverTimestamp()
      });

      return chatId;
    }

    async function sendFriendRequest() {
      try {
        const rawCode = $("friendCodeInput").value;
        const code = normalizeCode(rawCode);

        if (code.length !== 6) {
          alert("Введи 6-значный код друга.");
          return;
        }

        if (code === currentProfile.code) {
          alert("Нельзя добавить самого себя.");
          return;
        }

        const target = await findUserByCode(code);

        if (!target) {
          alert("Пользователь с таким кодом не найден.");
          return;
        }

        if ((currentProfile.friends || []).includes(target.uid)) {
          alert("Этот пользователь уже в друзьях.");
          return;
        }

        const requestId = `${currentUser.uid}_${target.uid}`;
        const reverseRequestId = `${target.uid}_${currentUser.uid}`;

        const existing = await getDoc(doc(db, "friendRequests", requestId));
        const reverseExisting = await getDoc(doc(db, "friendRequests", reverseRequestId));

        if (existing.exists()) {
          alert("Заявка уже отправлена.");
          return;
        }

        if (reverseExisting.exists()) {
          alert("Этот пользователь уже отправил тебе заявку. Прими её во вкладке «Заявки».");
          return;
        }

        await setDoc(doc(db, "friendRequests", requestId), {
          id: requestId,
          fromUid: currentUser.uid,
          toUid: target.uid,
          fromName: currentProfile.name,
          toName: target.name,
          fromCode: currentProfile.code,
          toCode: target.code,
          status: "pending",
          createdAt: serverTimestamp()
        });

        $("friendCodeInput").value = "";
        alert("Заявка отправлена.");
      } catch (error) {
        alert(error.message);
      }
    }

    async function acceptFriendRequest(request) {
      try {
        const batch = writeBatch(db);

        const myRef = doc(db, "users", currentUser.uid);
        const friendRef = doc(db, "users", request.fromUid);
        const requestRef = doc(db, "friendRequests", request.id);

        batch.update(myRef, {
          friends: arrayUnion(request.fromUid),
          updatedAt: serverTimestamp()
        });

        batch.update(friendRef, {
          friends: arrayUnion(currentUser.uid),
          updatedAt: serverTimestamp()
        });

        batch.update(requestRef, {
          status: "accepted",
          acceptedAt: serverTimestamp()
        });

        await batch.commit();

        const friendSnap = await getDoc(friendRef);

        if (friendSnap.exists()) {
          await createOrGetPrivateChat({
            uid: request.fromUid,
            ...friendSnap.data()
          });
        }

        alert("Заявка принята.");
      } catch (error) {
        alert(error.message);
      }
    }

    async function declineFriendRequest(request) {
      try {
        await updateDoc(doc(db, "friendRequests", request.id), {
          status: "declined",
          declinedAt: serverTimestamp()
        });

        alert("Заявка отклонена.");
      } catch (error) {
        alert(error.message);
      }
    }

    async function removeFriend(friendUid) {
      if (!confirm("Удалить друга?")) return;

      try {
        const myRef = doc(db, "users", currentUser.uid);
        const friendRef = doc(db, "users", friendUid);

        await updateDoc(myRef, {
          friends: arrayRemove(friendUid),
          updatedAt: serverTimestamp()
        });

        await updateDoc(friendRef, {
          friends: arrayRemove(currentUser.uid),
          updatedAt: serverTimestamp()
        });

        alert("Друг удалён.");
      } catch (error) {
        alert(error.message);
      }
    }

    async function openChatWithFriend(friendProfile) {
      selectedFriend = friendProfile;
      selectedChatId = await createOrGetPrivateChat(friendProfile);

      emptyChat.classList.add("hidden");
      chatPanel.classList.remove("hidden");

      $("chatName").textContent = friendProfile.name || "Друг";
      $("chatInfo").textContent = `Код: ${friendProfile.code || "------"}`;
      $("chatAvatar").textContent = initials(friendProfile.name || friendProfile.email);

      if (friendProfile.photoURL) {
        $("chatAvatar").innerHTML = `<img src="${friendProfile.photoURL}" alt="">`;
      }

      if (window.innerWidth <= 800) {
        $("sidebar").classList.remove("open");
      }

      listenMessages(selectedChatId);
    }

    async function sendMessage() {
      const input = $("messageInput");
      const text = input.value.trim();

      if (!text || !selectedChatId || !selectedFriend) return;

      input.value = "";

      const chatRef = doc(db, "chats", selectedChatId);
      const messagesRef = collection(db, "chats", selectedChatId, "messages");

      await addDoc(messagesRef, {
        text,
        senderUid: currentUser.uid,
        senderName: currentProfile.name,
        createdAt: serverTimestamp()
      });

      await updateDoc(chatRef, {
        lastMessage: text,
        lastMessageAt: serverTimestamp()
      });
    }

    function listenMessages(chatId) {
      if (unsubscribeMessages) unsubscribeMessages();

      const q = query(
        collection(db, "chats", chatId, "messages"),
        orderBy("createdAt", "asc")
      );

      unsubscribeMessages = onSnapshot(q, (snap) => {
        messagesEl.innerHTML = "";

        snap.forEach((docSnap) => {
          const msg = docSnap.data();
          const isMe = msg.senderUid === currentUser.uid;
          const createdDate = msg.createdAt?.toDate?.();

          const div = document.createElement("div");
          div.className = `message ${isMe ? "me" : "other"}`;
          div.innerHTML = `
            <div>${escapeHtml(msg.text || "")}</div>
            <div class="message-time">${formatTime(createdDate)}</div>
          `;

          messagesEl.appendChild(div);
        });

        messagesEl.scrollTop = messagesEl.scrollHeight;
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setTab(tab) {
      currentTab = tab;

      document.querySelectorAll(".tab").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });

      listenCurrentTab();
    }

    function listenCurrentTab() {
      if (unsubscribeList) unsubscribeList();

      list.innerHTML = "";

      if (!currentUser) return;

      if (currentTab === "chats") {
        renderChats();
      }

      if (currentTab === "friends") {
        renderFriends();
      }

      if (currentTab === "requests") {
        renderRequests();
      }
    }

    function renderEmptyList(text) {
      list.innerHTML = `
        <div class="empty" style="height:auto; padding:40px 16px;">
          <div>
            <i class="fas fa-inbox"></i>
            <p>${text}</p>
          </div>
        </div>
      `;
    }

    function renderChats() {
      const q = query(
        collection(db, "chats"),
        where("members", "array-contains", currentUser.uid)
      );

      unsubscribeList = onSnapshot(q, async (snap) => {
        list.innerHTML = "";

        if (snap.empty) {
          renderEmptyList("Пока нет чатов.");
          return;
        }

        const chats = [];

        snap.forEach((docSnap) => {
          chats.push({
            id: docSnap.id,
            ...docSnap.data()
          });
        });

        chats.sort((a, b) => {
          const at = a.lastMessageAt?.toMillis?.() || 0;
          const bt = b.lastMessageAt?.toMillis?.() || 0;
          return bt - at;
        });

        for (const chat of chats) {
          const friendUid = chat.members.find((uid) => uid !== currentUser.uid);

          if (!friendUid) continue;

          const friendSnap = await getDoc(doc(db, "users", friendUid));

          if (!friendSnap.exists()) continue;

          const friend = {
            uid: friendUid,
            ...friendSnap.data()
          };

          const item = document.createElement("div");
          item.className = `item ${selectedChatId === chat.id ? "active" : ""}`;
          item.innerHTML = `
            <div class="avatar">${friend.photoURL ? `<img src="${friend.photoURL}" alt="">` : initials(friend.name)}</div>
            <div class="item-body">
              <div class="item-title">${escapeHtml(friend.name || "Друг")}</div>
              <div class="item-sub">${escapeHtml(chat.lastMessage || "Открыть чат")}</div>
            </div>
          `;

          item.addEventListener("click", () => openChatWithFriend(friend));
          list.appendChild(item);
        }
      });
    }

    function renderFriends() {
      const userRef = doc(db, "users", currentUser.uid);

      unsubscribeList = onSnapshot(userRef, async (snap) => {
        const data = snap.data();
        const friends = data?.friends || [];

        list.innerHTML = "";

        if (!friends.length) {
          renderEmptyList("Пока нет друзей. Добавь по коду.");
          return;
        }

        for (const friendUid of friends) {
          const friendSnap = await getDoc(doc(db, "users", friendUid));

          if (!friendSnap.exists()) continue;

          const friend = {
            uid: friendUid,
            ...friendSnap.data()
          };

          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `
            <div class="avatar">${friend.photoURL ? `<img src="${friend.photoURL}" alt="">` : initials(friend.name)}</div>
            <div class="item-body">
              <div class="item-title">${escapeHtml(friend.name || "Друг")}</div>
              <div class="item-sub">Код: ${escapeHtml(friend.code || "------")}</div>
            </div>
            <div class="item-actions">
              <button class="small-btn" title="Чат">
                <i class="fas fa-message"></i>
              </button>
              <button class="small-btn danger" title="Удалить">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          `;

          const buttons = item.querySelectorAll("button");

          buttons[0].addEventListener("click", (e) => {
            e.stopPropagation();
            openChatWithFriend(friend);
          });

          buttons[1].addEventListener("click", (e) => {
            e.stopPropagation();
            removeFriend(friend.uid);
          });

          item.addEventListener("click", () => openChatWithFriend(friend));
          list.appendChild(item);
        }
      });
    }

    function renderRequests() {
      const q = query(
        collection(db, "friendRequests"),
        where("toUid", "==", currentUser.uid),
        where("status", "==", "pending")
      );

      unsubscribeList = onSnapshot(q, (snap) => {
        list.innerHTML = "";

        if (snap.empty) {
          renderEmptyList("Нет входящих заявок.");
          return;
        }

        snap.forEach((docSnap) => {
          const request = {
            id: docSnap.id,
            ...docSnap.data()
          };

          const item = document.createElement("div");
          item.className = "item";
          item.innerHTML = `
            <div class="avatar">${initials(request.fromName)}</div>
            <div class="item-body">
              <div class="item-title">${escapeHtml(request.fromName || "Пользователь")}</div>
              <div class="item-sub">Код: ${escapeHtml(request.fromCode || "------")}</div>
            </div>
            <div class="item-actions">
              <button class="small-btn success" title="Принять">
                <i class="fas fa-check"></i>
              </button>
              <button class="small-btn danger" title="Отклонить">
                <i class="fas fa-xmark"></i>
              </button>
            </div>
          `;

          const buttons = item.querySelectorAll("button");

          buttons[0].addEventListener("click", () => acceptFriendRequest(request));
          buttons[1].addEventListener("click", () => declineFriendRequest(request));

          list.appendChild(item);
        });
      });
    }

    function bindProfile() {
      if (unsubscribeProfile) unsubscribeProfile();

      unsubscribeProfile = onSnapshot(doc(db, "users", currentUser.uid), (snap) => {
        if (!snap.exists()) return;

        currentProfile = snap.data();

        $("myName").textContent = currentProfile.name || currentUser.email || "Vortex User";
        $("myCode").textContent = `Код: ${currentProfile.code || "------"}`;

        if (currentProfile.photoURL) {
          $("myAvatar").innerHTML = `<img src="${currentProfile.photoURL}" alt="">`;
        } else {
          $("myAvatar").textContent = initials(currentProfile.name || currentProfile.email);
        }

        listenCurrentTab();
      });
    }

    async function handleLogin() {
      try {
        clearError();

        const email = $("loginEmail").value.trim();
        const password = $("loginPassword").value;

        if (!email || !password) {
          showError("Введи email и пароль.");
          return;
        }

        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        showError(error.message);
      }
    }

    async function handleRegister() {
      try {
        clearError();

        const name = $("registerName").value.trim();
        const email = $("registerEmail").value.trim();
        const password = $("registerPassword").value;

        if (!name || !email || !password) {
          showError("Заполни имя, email и пароль.");
          return;
        }

        const cred = await createUserWithEmailAndPassword(auth, email, password);

        await updateProfile(cred.user, {
          displayName: name
        });

        await ensureUserProfile(cred.user, name);
      } catch (error) {
        showError(error.message);
      }
    }

    async function handleGoogleLogin() {
      try {
        clearError();

        const result = await signInWithPopup(auth, googleProvider);
        await ensureUserProfile(result.user);
      } catch (error) {
        showError(error.message);
      }
    }

    function showApp() {
      authPage.classList.add("hidden");
      mainApp.classList.remove("hidden");
    }

    function showAuth() {
      mainApp.classList.add("hidden");
      authPage.classList.remove("hidden");
    }

    function resetState() {
      currentUser = null;
      currentProfile = null;
      selectedChatId = null;
      selectedFriend = null;

      if (unsubscribeProfile) unsubscribeProfile();
      if (unsubscribeList) unsubscribeList();
      if (unsubscribeMessages) unsubscribeMessages();

      unsubscribeProfile = null;
      unsubscribeList = null;
      unsubscribeMessages = null;

      list.innerHTML = "";
      messagesEl.innerHTML = "";
      chatPanel.classList.add("hidden");
      emptyChat.classList.remove("hidden");
    }

    $("showRegisterBtn").addEventListener("click", () => {
      clearError();
      loginBox.classList.add("hidden");
      registerBox.classList.remove("hidden");
    });

    $("showLoginBtn").addEventListener("click", () => {
      clearError();
      registerBox.classList.add("hidden");
      loginBox.classList.remove("hidden");
    });

    $("loginBtn").addEventListener("click", handleLogin);
    $("registerBtn").addEventListener("click", handleRegister);
    $("googleBtn1").addEventListener("click", handleGoogleLogin);
    $("googleBtn2").addEventListener("click", handleGoogleLogin);

    $("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
    });

    $("addFriendBtn").addEventListener("click", sendFriendRequest);

    $("friendCodeInput").addEventListener("input", (e) => {
      e.target.value = normalizeCode(e.target.value);
    });

    $("friendCodeInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendFriendRequest();
    });

    $("sendBtn").addEventListener("click", sendMessage);

    $("messageInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    $("themeBtn").addEventListener("click", () => {
      document.body.classList.toggle("light");
      const isLight = document.body.classList.contains("light");
      localStorage.setItem("vortex_theme", isLight ? "light" : "dark");
      $("themeBtn").innerHTML = isLight
        ? `<i class="fas fa-sun"></i>`
        : `<i class="fas fa-moon"></i>`;
    });

    $("mobileMenuBtn").addEventListener("click", () => {
      $("sidebar").classList.add("open");
    });

    document.querySelectorAll(".tab").forEach((btn) => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });

    if (localStorage.getItem("vortex_theme") === "light") {
      document.body.classList.add("light");
      $("themeBtn").innerHTML = `<i class="fas fa-sun"></i>`;
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        resetState();
        showAuth();
        return;
      }

      try {
        currentUser = user;
        await ensureUserProfile(user);
        showApp();
        bindProfile();
      } catch (error) {
        showError(error.message);
      }
    });
</script>
</body>
</html>
