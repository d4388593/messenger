
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WebGram Pro – Исправленный</title>
    <style>
        :root {
          --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9;
          --text-secondary: #8b949e; --accent: #58a6ff;
          --accent-gradient: linear-gradient(135deg, #58a6ff, #bc8cff);
          --msg-sent: #1f6feb; --msg-received: #21262d; --danger: #f85149;
          --success: #3fb950; --warning: #d2991d; --radius: 12px;
          --shadow: 0 8px 24px rgba(0,0,0,0.4); --transition: 0.2s ease;
        }
        .light {
          --bg: #f0f2f5; --panel: #ffffff; --border: #d0d5dd; --text: #1a1a1a;
          --text-secondary: #5a5a5a; --msg-received: #ffffff;
          --msg-sent: #e3f2fd; --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        #app { width: 100%; height: 100vh; display: flex; background: var(--panel); border-radius: 0; overflow: hidden; }

        /* Аутентификация */
        .auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at top, #161b22, #0d1117); display:flex; align-items:center; justify-content:center; z-index:100; }
        .light .auth-overlay { background: radial-gradient(circle at top, #e0e0e0, #f0f2f5); }
        .auth-card { background: var(--panel); padding: 32px; border-radius: var(--radius); box-shadow: var(--shadow); width: 360px; text-align: center; border: 1px solid var(--border); }
        .auth-card h2 { margin-bottom: 24px; font-weight: 600; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card input { width: 100%; padding: 12px; margin-bottom: 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; font-size: 15px; }
        .auth-card input:focus { border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--accent-gradient); color: white; font-weight: 600; cursor: pointer; font-size: 16px; transition: var(--transition); }
        .auth-card button.secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); margin-top: 8px; }
        .auth-card .toggle-text { margin-top: 16px; font-size: 14px; color: var(--text-secondary); cursor: pointer; }
        .auth-error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; opacity: 0; transition: opacity 0.3s; }
        .auth-error.visible { opacity: 1; }

        /* Сайдбар */
        #main-ui { display: flex; width: 100%; height: 100%; }
        .sidebar { width: 320px; min-width: 320px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid var(--border); transition: transform 0.3s; }
        @media (max-width: 768px) {
          .sidebar { position: absolute; top:0; left:0; height:100%; z-index: 10; transform: translateX(-100%); }
          .sidebar.open { transform: translateX(0); }
        }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .sidebar-header .logo { font-size: 22px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .search-box { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
        .search-box input { background: none; border: none; color: var(--text); outline: none; width: 100%; font-size: 14px; }
        .sort-select { margin-top: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: 13px; width: 100%; }
        .chat-list { flex:1; overflow-y:auto; }
        .chat-item { display: flex; align-items: center; padding: 14px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: var(--transition); }
        .chat-item:hover, .chat-item.active { background: rgba(88,166,255,0.1); }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-gradient); display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; margin-right: 12px; flex-shrink: 0; text-transform: uppercase; overflow: hidden; cursor: pointer; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-info { flex:1; overflow: hidden; }
        .chat-info .name { font-weight: 500; margin-bottom: 2px; cursor: pointer; }
        .chat-info .last-msg { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 11px; color: var(--text-secondary); margin-left: 8px; }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; }
        .sidebar-footer button { flex:1; padding: 10px; border: none; border-radius: 8px; background: var(--accent-gradient); color: white; font-weight: 600; cursor: pointer; font-size: 13px; white-space: nowrap; }
        .admin-toggle { background: none; border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; display: none; }
        .admin-toggle.active { background: var(--accent); color: white; }

        /* Чат */
        .chat-main { flex:1; display:flex; flex-direction: column; position:relative; background: var(--bg); min-width: 0; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--panel); display: flex; align-items: center; justify-content: space-between; }
        .chat-header .user-info { display: flex; align-items: center; gap: 12px; }
        .chat-header .actions { display: flex; gap: 10px; }
        .icon-btn { background: var(--bg); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-size: 18px; transition: var(--transition); }
        .icon-btn:hover { background: var(--border); }
        .icon-btn.danger { background: rgba(248,81,73,0.15); color: var(--danger); border-color: var(--danger); }

        .messages { flex:1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-wrapper { display: flex; align-items: flex-end; gap: 8px; max-width: 75%; }
        .msg-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-wrapper.received { align-self: flex-start; }
        .msg-bubble { padding: 10px 14px; border-radius: 18px; position: relative; word-wrap: break-word; line-height: 1.4; background: var(--msg-received); border: 1px solid var(--border); }
        .sent .msg-bubble { background: var(--msg-sent); border-color: var(--accent); }
        .msg-sender { font-size: 12px; color: var(--accent); margin-bottom: 4px; font-weight: 500; }
        .msg-text { font-size: 15px; }
        .msg-time { font-size: 11px; color: var(--text-secondary); margin-top: 4px; text-align: right; }

        .msg-actions { position: absolute; right: 0; bottom: -28px; display: none; gap: 4px; background: var(--panel); border-radius: 12px; padding: 4px 8px; border: 1px solid var(--border); z-index: 2; }
        .msg-bubble:hover .msg-actions { display: flex; }
        .msg-actions button { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; }
        .msg-actions button:hover { color: var(--accent); }
        .reactions { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
        .reaction { background: rgba(88,166,255,0.1); border-radius: 10px; padding: 2px 8px; font-size: 13px; cursor: pointer; }
        .emoji-bar { position: absolute; top: -36px; left: 50%; transform: translateX(-50%); display: none; gap: 6px; background: var(--panel); border-radius: 12px; padding: 4px 8px; border: 1px solid var(--border); z-index: 5; white-space: nowrap; }
        .msg-bubble:hover .emoji-bar { display: flex; }
        .emoji-bar span { cursor: pointer; font-size: 16px; }

        .input-area { padding: 12px 20px; border-top: 1px solid var(--border); background: var(--panel); display: flex; align-items: center; gap: 10px; }
        .input-area input[type="text"] { flex:1; background: var(--bg); border: 1px solid var(--border); border-radius: 24px; padding: 12px 18px; color: var(--text); outline: none; font-size: 15px; }
        .record-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .record-btn:hover { background: var(--border); }

        .file-upload-progress { position: fixed; bottom: 20px; right: 20px; background: var(--panel); padding: 16px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); z-index: 200; width: 260px; }
        .progress-bar { height: 6px; background: var(--bg); border-radius: 3px; margin-top: 8px; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--accent-gradient); border-radius: 3px; transition: width 0.3s; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index:500; }
        .modal { background: var(--panel); border-radius: var(--radius); padding: 24px; width: 450px; max-width: 90%; border: 1px solid var(--border); box-shadow: var(--shadow); max-height: 80vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 16px; font-weight: 600; }
        .modal input, .modal textarea, .modal select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); margin-bottom: 12px; font-size: 14px; }
        .modal .user-list { max-height: 200px; overflow-y: auto; margin-bottom: 16px; }
        .modal .user-item { padding: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 8px; }
        .modal .user-item:hover { background: rgba(88,166,255,0.1); }
        .modal .user-item.selected { background: var(--accent); color: white; }

        .call-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 1000; display: flex; flex-direction: column; }
        .call-videos { flex:1; display: flex; flex-wrap: wrap; gap: 8px; padding: 20px; }
        .video-tile { flex:1; min-width: 280px; height: 240px; background: var(--bg); border-radius: var(--radius); overflow: hidden; position: relative; border: 1px solid var(--border); }
        .video-tile video { width: 100%; height: 100%; object-fit: cover; }
        .video-tile .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px; }
        .call-controls { padding: 20px; display: flex; justify-content: center; gap: 20px; }
        .ctrl-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--bg); color: var(--text); font-size: 20px; cursor: pointer; }
        .ctrl-btn.end { background: var(--danger); }

        .hidden { display: none !important; }
        .show { display: flex !important; }
        .back-btn { display: none; cursor: pointer; font-size: 1.5rem; margin-right: 12px; }
        @media (max-width: 768px) { .back-btn { display: block; } }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 28px; border-radius: 30px; background: var(--panel); border: 1px solid var(--accent); color: var(--text); box-shadow: var(--shadow); z-index: 9999; font-weight: 500; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        /* Опросы */
        .poll-container { margin-top: 8px; background: rgba(88,166,255,0.05); padding: 10px; border-radius: 12px; }
        .poll-question { font-weight: 600; margin-bottom: 4px; }
        .poll-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        .poll-option-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; cursor: pointer; padding: 6px; border-radius: 8px; transition: background 0.2s; }
        .poll-option-row:hover { background: rgba(88,166,255,0.1); }
        .poll-option-row input[type="radio"] { accent-color: var(--accent); transform: scale(1.2); margin: 0; }
        .poll-option-text { flex: 1; }
        .poll-bar-container { height: 6px; background: var(--border); border-radius: 3px; margin: 4px 0; overflow: hidden; }
        .poll-bar { height: 100%; background: var(--accent-gradient); border-radius: 3px; transition: width 0.4s ease-out; }
        .poll-results-text { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
        .poll-result-item { margin-bottom: 8px; }
        .poll-result-header { display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body id="body-root">
<div id="app">
    <!-- Аутентификация -->
    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">🚀 WebGram Pro</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-pass" placeholder="Пароль">
            <input type="password" id="reg-confirm-pass" class="hidden" placeholder="Подтвердите пароль">
            <div id="auth-error" class="auth-error"></div>
            <button type="button" id="auth-btn">Войти</button>
            <button type="button" id="auth-reg-btn" class="secondary" style="display:none;">Зарегистрироваться</button>
            <div id="auth-toggle" class="toggle-text">Нет аккаунта? <span style="color:var(--accent); cursor:pointer;">Регистрация</span></div>
        </div>
    </div>

    <!-- Основной интерфейс -->
    <div id="main-ui" class="hidden" style="display:flex; width:100%;">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span style="background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">WebGram</span>
                    <div style="display:flex; gap:8px;">
                        <button id="theme-toggle" class="icon-btn" style="width:36px;height:36px;font-size:16px;" title="Тема">🌓</button>
                        <button id="profile-btn" class="icon-btn" style="width:36px;height:36px;font-size:16px;" title="Профиль">👤</button>
                        <button id="logout-btn" class="icon-btn" style="width:36px;height:36px;font-size:14px;" title="Выйти">↪</button>
                    </div>
                </div>
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" id="search-input" placeholder="Поиск чатов...">
                </div>
                <select id="sort-select" class="sort-select">
                    <option value="time">По времени</option>
                    <option value="name">По имени</option>
                    <option value="type">По типу</option>
                </select>
            </div>
            <div class="chat-list" id="chat-list"></div>
            <div class="sidebar-footer">
                <button id="new-private-chat-btn">+ Новый чат</button>
                <button id="new-group-btn">+ Создать группу</button>
                <button id="new-channel-btn">+ Создать канал</button>
                <button id="admin-mode-btn" class="admin-toggle">👑 Админ</button>
            </div>
        </div>

        <div class="chat-main">
            <div id="empty-chat" style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-secondary);">
                Выберите чат, чтобы начать общение
            </div>
            <div id="chat-view" class="hidden" style="flex:1; display:flex; flex-direction:column;">
                <div class="chat-header">
                    <div class="user-info">
                        <span class="back-btn" id="back-btn">←</span>
                        <div class="avatar" id="chat-avatar" style="cursor:pointer;">?</div>
                        <div style="display:flex; flex-direction:column;">
                            <div id="chat-name" style="font-weight:600; cursor:pointer;">...</div>
                            <div id="chat-status" style="font-size:12px; color:var(--text-secondary);">В сети</div>
                        </div>
                    </div>
                    <div class="actions">
                        <button id="owner-nick-btn" class="icon-btn" title="Мой ник" style="display:none;">👤</button>
                        <button id="edit-group-btn" class="icon-btn" title="Редактировать" style="display:none;">✏️</button>
                        <button id="add-member-btn" class="icon-btn" title="Добавить участников">👥</button>
                        <button id="delete-chat-btn" class="icon-btn danger" title="Удалить чат" style="display:none;">🗑</button>
                        <button id="call-btn" class="icon-btn">📞</button>
                    </div>
                </div>
                <div class="messages bg-default" id="messages-container"></div>
                <div class="input-area" id="input-area">
                    <button id="attach-btn" class="record-btn">📎</button>
                    <input type="file" id="file-input" class="hidden">
                    <button id="voice-btn" class="record-btn">🎤</button>
                    <button id="video-circle-btn" class="record-btn">📹</button>
                    <button id="poll-create-btn" class="record-btn" title="Создать опрос">📊</button>
                    <input type="text" id="msg-input" placeholder="Введите сообщение...">
                    <button id="send-btn" class="record-btn" style="background: var(--accent-gradient); color: white; border: none;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <!-- Группа -->
        <div id="group-modal" class="modal hidden">
            <h3 id="modal-title">Создать группу</h3>
            <input type="text" id="group-name" placeholder="Название группы">
            <textarea id="group-desc" placeholder="Описание группы (необязательно)" rows="2"></textarea>
            <div style="margin-bottom: 10px; font-size: 14px; color: var(--text-secondary);">Участники: <span id="selected-count">0</span></div>
            <div class="search-box" style="margin-bottom: 10px;">
                <span>🔍</span>
                <input type="text" id="group-user-search" placeholder="Поиск пользователя...">
            </div>
            <div class="user-list" id="user-selector"></div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="modal-cancel" class="secondary" style="padding:10px 20px; background: #21262d; border:none; border-radius:8px; color:var(--text); cursor:pointer;">Отмена</button>
                <button id="modal-confirm" style="padding:10px 20px; background: var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer;">Создать</button>
            </div>
        </div>

        <div id="channel-modal" class="modal hidden">
            <h3>Создать канал</h3>
            <input type="text" id="channel-name" placeholder="Название канала">
            <textarea id="channel-desc" placeholder="Описание канала (необязательно)" rows="2"></textarea>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="channel-cancel" class="secondary" style="padding:10px 20px; background: #21262d; border:none; border-radius:8px; color:var(--text); cursor:pointer;">Отмена</button>
                <button id="channel-confirm" style="padding:10px 20px; background: var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer;">Создать</button>
            </div>
        </div>

        <div id="edit-group-modal" class="modal hidden">
            <h3>Редактировать</h3>
            <div style="text-align:center; margin-bottom:12px;">
                <img id="edit-group-avatar-preview" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover; background: #21262d; border: 2px solid var(--accent); display:none;">
                <div id="edit-group-avatar-placeholder" class="avatar" style="width:80px; height:80px; font-size:32px; display:inline-flex; margin:0;">?</div>
            </div>
            <input type="file" id="edit-group-avatar-input" accept="image/*" style="margin-bottom:12px;">
            <input type="text" id="edit-group-name" placeholder="Название">
            <textarea id="edit-group-desc" placeholder="Описание" rows="2"></textarea>
            <button id="save-edit-group" style="width:100%; padding:10px; background: var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer;">Сохранить</button>
            <button id="close-edit-group-modal" style="width:100%; margin-top:8px; padding:10px; background: #21262d; border:1px solid var(--border); border-radius:8px; color:var(--text); cursor:pointer;">Отмена</button>
        </div>

        <div id="private-chat-modal" class="modal hidden">
            <h3>Новый приватный чат</h3>
            <div class="user-list" id="private-user-selector"></div>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="private-modal-cancel" class="secondary" style="padding:10px 20px; background: #21262d; border:none; border-radius:8px; color:var(--text); cursor:pointer;">Отмена</button>
            </div>
        </div>

        <div id="user-profile-modal" class="modal hidden" style="text-align:center;">
            <img id="user-profile-avatar" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover; background:#21262d; margin-bottom:16px; display:none;">
            <div id="user-profile-avatar-placeholder" class="avatar" style="width:80px; height:80px; font-size:32px; display:inline-flex; margin:0 auto 16px;">?</div>
            <h3 id="profile-username-display"></h3>
            <p id="profile-display-name" style="color:var(--text-secondary); margin-bottom:8px;"></p>
            <p id="profile-bio-display" style="margin-bottom:8px; font-size:14px;"></p>
            <p id="profile-phone-display" style="font-size:14px; color:var(--accent);"></p>
            <p id="profile-lastseen-display" style="font-size:12px; color:var(--text-secondary); margin-top:8px;"></p>
            <button id="close-profile-modal" style="margin-top:16px; padding:10px 24px; background: var(--accent-gradient); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer;">Закрыть</button>
        </div>

        <div id="profile-modal" class="modal hidden">
            <h3>👤 Профиль</h3>
            <div style="text-align:center; margin-bottom:16px;">
                <img id="my-profile-avatar-preview" src="" style="width:80px; height:80px; border-radius:50%; object-fit:cover; background: #21262d; border: 2px solid var(--accent); display:none;" onerror="this.style.display='none'">
                <div id="my-profile-avatar-placeholder" class="avatar" style="width:80px; height:80px; font-size:32px; display:inline-flex; margin:0;">?</div>
            </div>
            <input type="file" id="profile-avatar-input" accept="image/*" style="margin-bottom:12px;">
            <label>Имя</label>
            <input type="text" id="profile-name" placeholder="Ваше отображаемое имя">
            <label>Username (логин)</label>
            <input type="text" id="profile-username" placeholder="Уникальное имя" disabled>
            <label>Описание</label>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>
    // --- Конфигурация Firebase ---
    firebase.initializeApp({
      apiKey: "AIzaSyCtPt1M2ej6B91yBx5VepU8SnrfO9MQAlk",
      authDomain: "my-messenger-d1622.firebaseapp.com",
      projectId: "my-messenger-d1622",
      storageBucket: "my-messenger-d1622.firebasestorage.app",
      messagingSenderId: "103633663743",
      appId: "1:103633663743:web:77638c18e54353fc717eca"
    });
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    // --- DOM Кэширование и Состояние ---
    const cache = {};
    const state = {
      currentUser: null,
      activeChatId: null,
      isRegistering: false,
      adminMode: true,
      sortBy: 'time',
      searchQuery: '',
      chats: [],
      users: [],
      cryptoKey: null,
      decryptedCache: new Map(),
      profileData: {},
      chatBackground: 'default',
      sendingLock: false,
      microphoneAllowed: false
    };
    const EMOJIS = ['👍','❤️','😂','😮','😢','😡'];
    let pc = null, localStream = null, screenStream = null, callInterval = null, currentCallId = null;
    let ownerNicknames = JSON.parse(localStorage.getItem('ownerNicknames') || '{}');

    function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
    function isAdmin() { return state.currentUser?.email === 'adminbog@example.com' || localStorage.getItem('isAdmin') === 'true'; }
    function isOwner() { return state.currentUser?.email === 'owner@webgram.pro' || localStorage.getItem('isOwner') === 'true'; }
    function isAdminOrOwner() { return isAdmin() || isOwner(); }
    function $ (id) { if (!cache[id]) cache[id] = document.getElementById(id); return cache[id]; }
    function val(id) { return $(id).value.trim(); }

    function debounce(fn, delay) {
      let timer;
      return function(...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    // --- Ошибки Аутентификации ---
    function showAuthError(msg) {
      const errEl = $('auth-error');
      errEl.textContent = msg;
      errEl.classList.add('visible');
      setTimeout(() => errEl.classList.remove('visible'), 5000);
    }

    function toggleAuthMode() {
      state.isRegistering = !state.isRegistering;
      const title = $('auth-title');
      const authBtn = $('auth-btn');
      const regBtn = $('auth-reg-btn');
      const confirmPass = $('reg-confirm-pass');

      if (state.isRegistering) {
        title.innerText = 'Регистрация';
        authBtn.style.display = 'none';
        regBtn.style.display = 'block';
        confirmPass.classList.remove('hidden');
      } else {
        title.innerText = 'Войти';
        authBtn.style.display = 'block';
        regBtn.style.display = 'none';
        confirmPass.classList.add('hidden');
      }

      $('login-email').value = '';
      $('login-pass').value = '';
      confirmPass.value = '';
      $('auth-error').classList.remove('visible');
    }

    // --- Шифрование ---
    async function loadEncryptionKey() {
      if (state.cryptoKey) return;
      try {
        const ref = db.collection('keys').doc('sharedKey');
        const doc = await ref.get();
        if (doc.exists) {
          state.cryptoKey = await crypto.subtle.importKey('jwk', doc.data().key, { name: 'AES-GCM' }, false, ['encrypt', 'decrypt']);
        } else {
          const key = await crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']);
          const jwk = await crypto.subtle.exportKey('jwk', key);
          await ref.set({ key: jwk });
          state.cryptoKey = key;
        }
      } catch (e) {
        state.cryptoKey = await crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']);
      }
    }

    async function encryptText(plainText) {
      if (!state.cryptoKey) await loadEncryptionKey();
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encoded = new TextEncoder().encode(plainText);
      const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, state.cryptoKey, encoded);
      return { iv: btoa(String.fromCharCode(...iv)), data: btoa(String.fromCharCode(...new Uint8Array(cipher))) };
    }

    async function decryptText(encData, ivB64) {
      if (!state.cryptoKey) await loadEncryptionKey();
      const iv = Uint8Array.from(atob(ivB64), c => c.charCodeAt(0));
      const cipher = Uint8Array.from(atob(encData), c => c.charCodeAt(0));
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, state.cryptoKey, cipher);
      return new TextDecoder().decode(plain);
    }

    async function decryptAndCache(msg) {
      if (state.decryptedCache.has(msg.id)) return state.decryptedCache.get(msg.id);
      try {
        const text = await decryptText(msg.encrypted.data, msg.encrypted.iv);
        state.decryptedCache.set(msg.id, text);
        return text;
      } catch (e) { return '[ошибка расшифровки]'; }
    }

    // --- Аутентификация ---
    async function handleAuth() {
      const email = val('login-email'), password = val('login-pass');
      if (!email || !password) return showAuthError('Введите email и пароль');

      if (state.isRegistering) {
        const confirmPass = val('reg-confirm-pass');
        if (password !== confirmPass) return showAuthError('Пароли не совпадают');
        if (password.length < 6) return showAuthError('Пароль слишком короткий (мин. 6)');

        try {
          const userCredential = await auth.createUserWithEmailAndPassword(email, password);
          await db.collection('users').doc(userCredential.user.uid).set({
            email, displayName: email.split('@')[0], createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          state.currentUser = userCredential.user;
          localStorage.setItem('currentUser', JSON.stringify({ email: userCredential.user.email, uid: userCredential.user.uid }));
          await loadEncryptionKey();
          enterApp();
        } catch (error) {
          if (error.code === 'auth/email-already-in-use') showAuthError('⚠️ Аккаунт с таким email уже существует');
          else showAuthError('Ошибка регистрации: ' + error.message);
        }
      } else {
        try {
          const userCredential = await auth.signInWithEmailAndPassword(email, password);
          state.currentUser = userCredential.user;
          localStorage.setItem('currentUser', JSON.stringify({ email: userCredential.user.email, uid: userCredential.user.uid }));
          await loadEncryptionKey();
          enterApp();
        } catch (error) {
          if (error.code === 'auth/user-not-found') showAuthError('⚠️ Аккаунт с таким email не найден. Зарегистрируйтесь.');
          else if (error.code === 'auth/wrong-password') showAuthError('❌ Неверный пароль');
          else if (error.code === 'auth/invalid-credential') showAuthError('❌ Неверный email или пароль');
          else showAuthError('Ошибка входа: ' + error.message);
        }
      }
    }

    function enterApp() {
      $('auth-screen').classList.add('hidden');
      $('main-ui').classList.remove('hidden');
      initApp();
    }

    function logout() {
      auth.signOut().then(() => {
        state.currentUser = null;
        localStorage.removeItem('currentUser');
        location.reload();
      });
    }

    // --- Основной функционал ---
    async function initApp() {
      if (!state.currentUser) return;

      try {
        const usersSnap = await db.collection('users').get();
        state.users = usersSnap.docs.map(doc => doc.data());
        setupGlobalChatListener();
      } catch (e) {
        showToast('Ошибка загрузки данных');
      }

      loadProfile();
      startLastSeenUpdates();
    }

    function setupGlobalChatListener() {
      db.collection('chats').onSnapshot(snap => {
        state.chats = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderChatList();
      });
    }

    function renderChatList() {
      const container = $('chat-list');
      const fragment = document.createDocumentFragment();

      const visibleChats = state.chats.filter(c => {
        if (isAdminOrOwner() && state.adminMode) return true;
        return c.participants?.includes(state.currentUser.email);
      });

      const otherUsers = state.users.filter(u => u.email !== state.currentUser.email);
      const displayChats = [...visibleChats];
      otherUsers.forEach(u => {
        const privId = [state.currentUser.email, u.email].sort().join('_');
        if (!visibleChats.find(c => c.id === privId)) {
          displayChats.push({ id: privId, type: 'private', participants: [state.currentUser.email, u.email], name: u.displayName || u.email, messages: [] });
        }
      });

      const q = state.searchQuery.toLowerCase();
      const filtered = displayChats.filter(c => (c.name || '').toLowerCase().includes(q) || (c.participants || []).join(' ').toLowerCase().includes(q));

      filtered.sort((a,b) => {
        const ta = a.messages?.slice(-1)[0]?.timestamp || 0;
        const tb = b.messages?.slice(-1)[0]?.timestamp || 0;
        return tb - ta;
      });

      filtered.forEach(chat => {
        const el = document.createElement('div');
        el.className = `chat-item ${state.activeChatId === chat.id ? 'active' : ''}`;
        const other = chat.participants?.find(p => p !== state.currentUser.email) || chat.name || 'U';
        const last = chat.messages?.slice(-1)[0];
        el.innerHTML = `
          <div class="avatar">${(chat.name || other).charAt(0).toUpperCase()}</div>
          <div class="chat-info">
            <div class="name">${chat.name || other}</div>
            <div class="last-msg">${last ? (last.type === 'poll' ? '📊 Опрос' : last.text || '[файл]') : 'Нет сообщений'}</div>
          </div>
          <div class="chat-time">${last ? new Date(last.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</div>
        `;
        el.onclick = () => openChat(chat.id);
        fragment.appendChild(el);
      });

      container.innerHTML = '';
      container.appendChild(fragment);
    }

    async function openChat(id) {
      state.activeChatId = id;
      const ref = db.collection('chats').doc(id);
      const doc = await ref.get();
      if (!doc.exists) {
        const parts = id.split('_');
        await ref.set({ type: 'private', participants: parts, messages: [], name: null });
      }
      $('empty-chat').classList.add('hidden');
      $('chat-view').classList.remove('hidden');

      if (chatUnsub) chatUnsub();
      chatUnsub = ref.onSnapshot(async docSnap => {
        const data = docSnap.data();
        const other = data.participants?.find(p => p !== state.currentUser.email);
        $('chat-name').textContent = data.name || other || 'Чат';
        $('chat-avatar').textContent = (data.name || other || 'C').charAt(0).toUpperCase();
        renderMessages(data.messages || []);
      });
      renderChatList();
    }

    async function renderMessages(msgs) {
      const container = $('messages-container');
      const fragment = document.createDocumentFragment();

      for (const msg of msgs) {
        if (msg.type === 'text' && msg.encrypted) {
          msg.text = await decryptAndCache(msg);
        }
      }

      msgs.forEach((msg) => {
        const isOwn = msg.sender === state.currentUser.email;
        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${isOwn ? 'sent' : 'received'}`;
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';

        if (msg.type === 'poll') {
          renderPoll(bubble, msg);
        } else if (msg.type === 'file') {
          bubble.innerHTML = `<div class="file-card" onclick="window.open('${msg.fileUrl}', '_blank')">
            <div class="avatar">📄</div>
            <div style="font-size:0.8rem"><b style="color:white">${msg.fileName}</b><br><span style="color:var(--text-muted)">${(msg.fileSize / 1024).toFixed(1)} KB</span></div>
          </div>`;
        } else {
          bubble.innerHTML = `<div class="msg-text">${msg.text || ''}</div>`;
        }

        const timeEl = document.createElement('div');
        timeEl.className = 'msg-time';
        timeEl.textContent = (msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '') + (msg.isEdited ? ' (изменено)' : '');
        bubble.appendChild(timeEl);

        if (isOwn && msg.type === 'text') {
          const editBtn = document.createElement('div');
          editBtn.className = 'msg-edit-btn';
          editBtn.innerText = '✎';
          editBtn.onclick = () => editMessage(msg.id);
          wrapper.appendChild(editBtn);
          wrapper.onmouseenter = () => { editBtn.classList.add('visible'); editBtn.timer = setTimeout(() => editBtn.classList.remove('visible'), 3000); };
          wrapper.onmouseleave = () => { clearTimeout(editBtn.timer); editBtn.timer = setTimeout(() => editBtn.classList.remove('visible'), 3000); };
        }

        wrapper.appendChild(bubble);
        fragment.appendChild(wrapper);
      });

      container.innerHTML = '';
      container.appendChild(fragment);
      container.scrollTop = container.scrollHeight;
    }

    function renderPoll(bubble, msg) {
      const pollDiv = document.createElement('div');
      pollDiv.className = 'poll-container';
      pollDiv.innerHTML = `<div class="poll-question">${msg.question}</div>`;
      const votes = msg.votes || {};
      const userVoted = Object.values(votes).flat().includes(state.currentUser.email);
      msg.options.forEach((opt, idx) => {
        const row = document.createElement('div');
        row.className = 'poll-option-row';
        row.innerHTML = `<input type="radio" name="p_${msg.id}" ${userVoted ? 'disabled' : ''}> <span class="poll-option-text">${opt}</span>`;
        if (!userVoted) row.onclick = () => votePollMessage(msg.id, idx);
        pollDiv.appendChild(row);
      });
      if (userVoted) {
        const total = Object.values(votes).reduce((s, a) => s + a.length, 0);
        msg.options.forEach((opt, idx) => {
          const count = (votes[idx] || []).length;
          const pct = total ? Math.round(count/total*100) : 0;
          pollDiv.innerHTML += `<div class="poll-result-item"><div class="poll-result-header"><span>${opt}</span><span>${count} (${pct}%)</span></div><div class="poll-bar-container"><div class="poll-bar" style="width:${pct}%"></div></div></div>`;
        });
      }
      bubble.appendChild(pollDiv);
    }

    async function votePollMessage(msgId, idx) {
      const ref = db.collection('chats').doc(state.activeChatId);
      const doc = await ref.get();
      const msgs = doc.data().messages;
      const mIdx = msgs.findIndex(m => m.id === msgId);
      const msg = msgs[mIdx];
      msg.votes = msg.votes || {};
      Object.keys(msg.votes).forEach(k => {
        msg.votes[k] = msg.votes[k].filter(e => e !== state.currentUser.email);
      });
      if (!msg.votes[idx]) msg.votes[idx] = [];
      msg.votes[idx].push(state.currentUser.email);
      await ref.update({ messages: msgs });
    }

    async function sendMessage() {
      const input = $('msg-input');
      const text = input.value.trim();
      if (!text || !state.activeChatId) return;
      input.value = '';
      try {
        const encrypted = await encryptText(text);
        await db.collection('chats').doc(state.activeChatId).update({
          messages: firebase.firestore.FieldValue.arrayUnion({
            id: genId(), sender: state.currentUser.email, type: 'text', encrypted, timestamp: Date.now(), reactions: {}
          })
        });
      } catch (e) { showToast('Ошибка отправки'); }
    }

    async function sendPoll() {
      const q = $('poll-question-input').value.trim();
      const d = $('poll-desc-input').value.trim();
      const opts = [...document.querySelectorAll('.poll-option-input')].map(i => i.value.trim()).filter(Boolean);
      if (!q || opts.length < 2) return showToast('Нужен вопрос и 2+ варианта');
      await db.collection('chats').doc(state.activeChatId).update({
        messages: firebase.firestore.FieldValue.arrayUnion({
          id: genId(), sender: state.currentUser.email, type: 'poll', question: q, description: d, options: opts, votes: {}, timestamp: Date.now()
        })
      });
      closeModal();
    }

    async function handleFileUpload(file) {
      const prog = $('upload-progress');
      prog.classList.remove('hidden');
      try {
        const ref = storage.ref(`files/${genId()}_${file.name}`);
        const task = ref.put(file);
        task.on('state_changed', s => {
          const p = (s.bytesTransferred / s.totalBytes) * 100;
          $('progress-fill').style.width = p + '%';
          $('progress-text').textContent = Math.round(p) + '%';
        }, e => { alert(e); }, async () => {
          const url = await task.snapshot.ref.getDownloadURL();
          await db.collection('chats').doc(state.activeChatId).update({
            messages: firebase.firestore.FieldValue.arrayUnion({
              id: genId(), sender: state.currentUser.email, type: 'file', fileUrl: url, fileName: file.name, fileType: file.type, fileSize: file.size, timestamp: Date.now()
            })
          });
          prog.classList.add('hidden');
        });
      } catch (e) { alert(e); prog.classList.add('hidden'); }
    }

    function showGroupModal(isAdding) {
      $('modal-overlay').classList.remove('hidden');
      $('group-modal').classList.remove('hidden');
      $('modal-title').textContent = isAdding ? 'Добавить участников' : 'Создать группу';
      $('group-name').style.display = isAdding ? 'none' : 'block';
      renderUserSelector();
    }

    function renderUserSelector(filter = '') {
      const sel = $('user-selector');
      sel.innerHTML = '';
      state.users.filter(u => u.email !== state.currentUser.email && u.email.toLowerCase().includes(filter.toLowerCase())).forEach(u => {
        const item = document.createElement('div');
        item.className = 'user-item';
        item.innerHTML = `<input type="checkbox" value="${u.email}"> <span>${u.displayName || u.email}</span>`;
        item.onclick = (e) => { if(e.target.tagName !== 'INPUT') item.querySelector('input').click(); };
        sel.appendChild(item);
      });
    }

    async function confirmGroupAction() {
      const selected = [...document.querySelectorAll('#user-selector input:checked')].map(i => i.value);
      if (!selected.length) return showToast('Выберите участников');
      if ($('modal-title').textContent === 'Создать группу') {
        const name = $('group-name').value.trim();
        if (!name) return showToast('Введите название');
        const id = 'group_' + genId();
        await db.collection('chats').doc(id).set({ type: 'group', name, participants: [...selected, state.currentUser.email], messages: [] });
        openChat(id);
      } else {
        const ref = db.collection('chats').doc(state.activeChatId);
        const doc = await ref.get();
        await ref.update({ participants: [...new Set([..._docs.data().participants || [], ...selected])] });
      }
      closeModal();
    }

    function closeModal() {
      $('modal-overlay').classList.add('hidden');
      document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
    }

    function startLastSeenUpdates() {
      setInterval(async () => {
        if (!state.currentUser?.uid) return;
        await db.collection('users').doc(state.currentUser.uid).set({ lastSeen: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
      }, 60000);
    }

    function loadProfile() {
      if (!state.currentUser) return;
      db.collection('users').doc(state.currentUser.uid).get().then(doc => {
        if (doc.exists) {
          state.profileData = doc.data();
          state.chatBackground = state.profileData.chatBackground || 'default';
          applyChatBackground();
        }
      });
    }

    function applyChatBackground() {
      const c = $('messages-container');
      if (c) c.className = 'messages no-scrollbar bg-' + state.chatBackground;
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // --- События ---
    document.addEventListener('DOMContentLoaded', () => {
      $('auth-btn').addEventListener('click', handleAuth);
      $('auth-reg-btn').addEventListener('click', handleAuth);
      $('auth-toggle').addEventListener('click', toggleAuthMode);
      $('logout-btn').addEventListener('click', logout);
      $('search-input').addEventListener('input', debounce(() => { state.searchQuery = $('search-input').value; renderChatList(); }, 300));
      $('new-private-chat-btn').addEventListener('click', () => {
        $('modal-overlay').classList.remove('hidden');
        $('private-chat-modal').classList.remove('hidden');
        const sel = $('private-user-selector');
        sel.innerHTML = '';
        state.users.filter(u => u.email !== state.currentUser.email).forEach(u => {
          const item = document.createElement('div');
          item.className = 'user-item';
          item.textContent = u.displayName || u.email;
          item.onclick = async () => {
            const id = [state.currentUser.email, u.email].sort().join('_');
            await db.collection('chats').doc(id).set({ type: 'private', participants: [state.currentUser.email, u.email], messages: [] }, { merge: true });
            openChat(id);
            closeModal();
          };
          sel.appendChild(item);
        });
      });
      $('new-group-btn').addEventListener('click', () => showGroupModal(false));
      $('new-channel-btn').addEventListener('click', () => {
        $('modal-overlay').classList.remove('hidden');
        $('channel-modal').classList.remove('hidden');
      });
      $('channel-confirm').addEventListener('click', async () => {
        const name = $('channel-name').value.trim();
        if (!name) return showToast('Введите название');
        const id = 'channel_' + genId();
        await db.collection('chats').doc(id).set({ type: 'channel', name, owner: state.currentUser.email, participants: [state.currentUser.email], messages: [] });
        closeModal();
        openChat(id);
      });
      $('send-btn').addEventListener('click', sendMessage);
      $('msg-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
      $('attach-btn').addEventListener('click', () => $('file-input').click());
      $('file-input').addEventListener('change', e => { if (e.target.files[0]) handleFileUpload(e.target.files[0]); });
      $('back-btn').addEventListener('click', () => {
         document.getElementById('sidebar').classList.remove('open');
         $('chat-view').classList.add('hidden');
         $('empty-chat').classList.remove('hidden');
      });
      $('poll-create-btn').addEventListener('click', () => {
        $('modal-overlay').classList.remove('hidden');
        $('poll-create-modal').classList.remove('hidden');
      });
      $('send-poll-btn').addEventListener('click', sendPoll);
      $('add-poll-option-create').addEventListener('click', () => {
        const container = $('poll-options-create-container');
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'poll-option-input';
        input.placeholder = `Вариант ${container.children.length + 1}`;
        container.appendChild(input);
      });
      $('modal-confirm').addEventListener('click', confirmGroupAction);
      $('modal-cancel').addEventListener('click', closeModal);
      $('close-poll-create-modal').addEventListener('click', closeModal);
      $('profile-btn').addEventListener('click', () => {
        $('modal-overlay').classList.remove('hidden');
        $('profile-modal').classList.remove('hidden');
        $('profile-name').value = state.profileData.displayName || state.currentUser.email;
        $('profile-bio').value = state.profileData.bio || '';
        $('profile-phone').value = state.profileData.phone || '';
        $('profile-background').value = state.chatBackground;
      });
      $('profile-save').addEventListener('click', async () => {
        const updates = {
          displayName: $('profile-name').value,
          bio: $('profile-bio').value,
          phone: $('profile-phone').value,
          chatBackground: $('profile-background').value
        };
        await db.collection('users').doc(state.currentUser.uid).set(updates, { merge: true });
        state.profileData = { ...state.profileData, ...updates };
        state.chatBackground = updates.chatBackground;
        applyChatBackground();
        closeModal();
        showToast('Профиль сохранен');
      });
      $('profile-close').addEventListener('click', closeModal);

      $('group-user-search').addEventListener('input', (e) => {
        renderUserSelector(e.target.value);
      });

      initApp();
    });

    // Сессия: Автоматический вход
    auth.onAuthStateChanged(user => {
      if (user) {
        state.currentUser = user;
        localStorage.setItem('currentUser', JSON.stringify({ email: user.email, uid: user.uid }));
        enterApp();
      } else {
        state.currentUser = null;
        localStorage.removeItem('currentUser');
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('main-ui').classList.add('hidden');
      }
    });
</script>
</body>
</html>
