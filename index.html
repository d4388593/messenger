
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGram - Cloud Messenger Pro</title>
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --panel-dark: #2c2c2c;
            --accent-blue: #2aabee;
            --text-main: #ffffff;
            --text-muted: #b1b1b1;
            --msg-sent: #2b5278;
            --msg-received: #3d3d3d;
            --danger: #e53935;
            --transition: 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; overflow: hidden; }

        .hidden { display: none !important; }
        .flex { display: flex; }
        .center { display: flex; align-items: center; justify-content: center; }

        /* Scrollbar Hiding */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Auth Screen */
        #auth-screen {
            height: 100vh; width: 100vw;
            background: linear-gradient(135deg, #1e1e1e 0%, #121212 100%);
            z-index: 100; position: fixed; top: 0; left: 0;
        }
        .auth-card {
            background: var(--panel-dark); padding: 2rem; border-radius: 15px;
            width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center;
        }
        .auth-card h2 { margin-bottom: 1.5rem; font-weight: 500; }
        .auth-card input {
            width: 100%; padding: 12px; margin-bottom: 1rem;
            background: #3d3d3d; border: 1px solid #4d4d4d;
            color: white; border-radius: 8px; outline: none;
        }
        .auth-card input:focus { border-color: var(--accent-blue); }
        .btn-primary {
            width: 100%; padding: 12px; background: var(--accent-blue);
            color: white; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: var(--transition);
        }
        .auth-switch { margin-top: 1rem; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; }

        /* Main Layout */
        #app-screen { height: 100vh; display: flex; }
        #sidebar {
            width: 350px; background: var(--panel-dark);
            border-right: 1px solid #3d3d3d; display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 20px; display: flex; flex-direction: column;
            gap: 15px; border-bottom: 1px solid #3d3d3d;
        }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        .search-input {
            width: 100%; padding: 10px 12px; background: #3d3d3d;
            border: 1px solid #4d4d4d; border-radius: 20px;
            color: white; outline: none; font-size: 0.9rem;
        }

        .chat-list { overflow-y: auto; flex-grow: 1; }
        .chat-item {
            padding: 15px; cursor: pointer; display: flex; align-items: center;
            transition: background 0.2s; border-bottom: 1px solid #333;
        }
        .chat-item:hover { background: #363636; }
        .chat-item.active { background: #3d3d3d; border-left: 4px solid var(--accent-blue); }
        .avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--accent-blue); margin-right: 15px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; text-transform: uppercase;
        }
        .chat-info { flex-grow: 1; overflow: hidden; }
        .chat-info .name { font-weight: 500; display: block; margin-bottom: 3px; }
        .chat-info .last-msg { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-time { font-size: 0.75rem; color: var(--text-muted); }

        .sidebar-footer { padding: 15px; border-top: 1px solid #3d3d3d; }

        #chat-window {
            flex-grow: 1; display: flex; flex-direction: column;
            background: #0f0f0f; position: relative;
        }
        .chat-header {
            padding: 10px 20px; background: var(--panel-dark);
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #3d3d3d;
        }
        .messages-container {
            flex-grow: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 10px;
            background-image: url('https://www.transparenttextures.com/patterns/dark-leather.png');
        }
        .message {
            max-width: 70%; padding: 8px 12px; border-radius: 12px;
            position: relative; font-size: 0.95rem; line-height: 1.4;
        }
        .message.sent { align-self: flex-end; background: var(--msg-sent); border-bottom-right-radius: 2px; }
        .message.received { align-self: flex-start; background: var(--msg-received); border-bottom-left-radius: 2px; }

        /* Edit Button - Circular Telegram Style */
        .msg-edit-btn {
            position: absolute; width: 28px; height: 28px;
            background: var(--panel-dark); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-muted); font-size: 12px;
            opacity: 0; transition: opacity 0.5s ease; z-index: 5;
        }
        .message.sent .msg-edit-btn { right: -35px; }
        .message.received .msg-edit-btn { left: -35px; }
        .msg-edit-btn.visible { opacity: 1; }

        .edit-input {
            background: #444; color: white; border: 1px solid var(--accent-blue);
            border-radius: 8px; padding: 5px; width: 100%; outline: none;
        }
        .edited-label { font-size: 0.6rem; color: rgba(255,255,255,0.4); margin-left: 5px; font-style: italic; }
        .msg-meta { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-align: right; margin-top: 4px; }
        .msg-sender { font-size: 0.8rem; font-weight: bold; color: var(--accent-blue); margin-bottom: 4px; }

        /* Reactions */
        .reaction-bar {
            position: absolute; bottom: -35px;
            background: var(--panel-dark); border-radius: 20px;
            padding: 5px 10px; display: none; gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10;
        }
        .message.sent .reaction-bar { right: 0; }
        .message.received .reaction-bar { left: 0; }
        .message:hover .reaction-bar { display: flex; }
        .reaction-emoji { cursor: pointer; font-size: 1.2rem; transition: transform 0.2s; user-select: none; }
        .reaction-emoji:hover { transform: scale(1.3); }
        .reaction-display {
            display: flex; gap: 5px; margin-top: 4px;
            font-size: 0.75rem; justify-content: flex-start;
        }
        .reaction-pill { background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 10px; cursor: pointer; }

        /* File Upload */
        .file-card {
            background: rgba(0,0,0,0.2); border-radius: 8px; padding: 8px;
            display: flex; align-items: center; gap: 10px; cursor: pointer;
        }
        .file-card img, .file-card video { max-width: 200px; max-height: 150px; border-radius: 5px; }
        .upload-progress {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--panel-dark); padding: 15px; border-radius: 10px;
            border: 1px solid var(--accent-blue); z-index: 2000;
        }
        .progress-bg { width: 200px; height: 10px; background: #444; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-blue); width: 0%; transition: width 0.2s; }

        .input-area {
            padding: 20px; background: var(--panel-dark);
            display: flex; gap: 10px; align-items: center;
        }
        .input-area input {
            flex-grow: 1; padding: 12px; background: #3d3d3d;
            border: none; border-radius: 8px; color: white; outline: none;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .modal {
            background: var(--panel-dark); padding: 20px; border-radius: 15px;
            width: 400px; max-width: 90%;
        }
        .modal-title { margin-bottom: 15px; font-size: 1.2rem; font-weight: bold; }
        .user-selector {
            max-height: 200px; overflow-y: auto; margin-bottom: 15px;
            border: 1px solid #4d4d4d; border-radius: 8px;
        }
        .user-option {
            padding: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .user-option:hover { background: #3d3d3d; }
        .user-option.selected { background: var(--msg-sent); }

        /* CALL UI */
        #call-modal {
            width: 80vw; height: 80vh; background: #000; border-radius: 20px;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .call-grid {
            flex-grow: 1; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 10px; padding: 20px;
        }
        .video-tile {
            background: #222; border-radius: 10px; overflow: hidden;
            position: relative; height: 250px;
        }
        .video-tile video { width: 100%; height: 100%; object-fit: cover; }
        .video-label {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px; font-size: 0.8rem;
        }
        .call-controls {
            height: 100px; background: rgba(20,20,20,0.9);
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        .ctrl-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            cursor: pointer; color: white; font-size: 1.2rem; transition: 0.2s;
        }
        .ctrl-btn.mute { background: #4d4d4d; }
        .ctrl-btn.share { background: #4d4d4d; }
        .ctrl-btn.end { background: var(--danger); }
        .call-timer {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; font-family: monospace;
        }

        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #chat-window { display: none; }
            #chat-window.active {
                display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            }
            .back-btn { display: block !important; margin-right: 15px; cursor: pointer; }
        }
        .back-btn { display: none; font-size: 1.5rem; }
    </style>
</head>
<body>

<div id="auth-screen" class="center">
    <div class="auth-card">
        <h2 id="auth-title">Добро пожаловать в WebGram</h2>
        <input type="text" id="auth-user" placeholder="Логин">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button id="auth-btn" class="btn-primary">Войти</button>
        <div id="auth-toggle" class="auth-switch">
            <span id="auth-toggle-text">Нет аккаунта? Регистрация</span>
        </div>
    </div>
</div>

<div id="app-screen" class="hidden">
    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="top-row">
                <div style="font-weight: bold; font-size: 1.2rem;">WebGram</div>
                <button id="btn-logout" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.8rem;">Выйти</button>
            </div>
            <div class="search-container">
                <input type="text" id="search-chat" class="search-input" placeholder="Поиск чатов, людей...">
            </div>
        </div>
        <div id="chat-list" class="chat-list no-scrollbar"></div>
        <div class="sidebar-footer">
            <button id="btn-create-group" class="btn-primary" style="background: var(--accent-blue);">Создать группу</button>
        </div>
    </aside>

    <main id="chat-window">
        <div id="empty-state" class="center" style="flex-grow: 1; color: var(--text-muted);">
            Выберите чат, чтобы начать общение
        </div>
        <div id="chat-content" class="hidden" style="height: 100%; display: flex; flex-direction: column;">
            <div class="chat-header">
                <div class="user-meta">
                    <span id="back-btn" class="back-btn">←</span>
                    <div id="header-avatar" class="avatar">?</div>
                    <div style="margin-left: 10px;">
                        <div id="header-name" style="font-weight: bold;">Пользователь</div>
                        <div id="header-status" style="font-size: 0.7rem; color: var(--text-muted);">В сети</div>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-add-member" class="ctrl-btn mute" style="width: 40px; height: 40px; font-size: 1rem; display: none;">👤+</button>
                    <button id="btn-call" class="ctrl-btn mute" style="width: 40px; height: 40px; font-size: 1rem;">📞</button>
                </div>
            </div>
            <div id="messages-container" class="messages-container no-scrollbar"></div>
            <div class="input-area">
                <button id="btn-attach" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1.5rem;">📎</button>
                <input type="file" id="file-input" class="hidden">
                <input type="text" id="msg-input" placeholder="Введите сообщение...">
                <button id="btn-send" class="btn-primary" style="width: auto; padding: 10px 20px;">Отправить</button>
            </div>
        </div>
    </main>
</div>

<!-- MODALS -->
<div id="modal-container" class="modal-overlay hidden">
    <!-- Group Modal -->
    <div id="group-modal" class="modal hidden">
        <div class="modal-title" id="modal-title">Создать группу</div>
        <input type="text" id="group-name" placeholder="Название группы" style="width:100%; padding:10px; margin-bottom:15px; background:#3d3d3d; border:1px solid #4d4d4d; color:white; border-radius:8px;">
        <div style="margin-bottom: 10px; font-size: 0.9rem;">Добавить участников:</div>
        <div id="user-selector" class="user-selector"></div>
        <div class="flex" style="gap: 10px; justify-content: flex-end;">
            <button id="btn-modal-cancel" class="btn-primary" style="width: auto; background: #4d4d4d;">Отмена</button>
            <button id="btn-modal-confirm" class="btn-primary" style="width: auto;">Создать</button>
        </div>
    </div>

    <!-- Incoming Call Modal -->
    <div id="incoming-call-modal" class="modal hidden" style="text-align: center;">
        <div class="modal-title">Входящий звонок...</div>
        <div id="caller-name" style="margin-bottom: 20px; font-size: 1.5rem;">Пользователь</div>
        <div class="flex" style="gap: 15px; justify-content: center;">
            <button id="btn-accept-call" class="btn-primary" style="background: #4caf50; width: auto;">Принять</button>
            <button id="btn-decline-call" class="btn-primary" style="background: var(--danger); width: auto;">Отклонить</button>
        </div>
    </div>

    <!-- Call Window -->
    <div id="call-modal" class="modal hidden" style="width: 80vw; height: 80vh; background: #000; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;">
        <div class="call-timer" id="call-timer">00:00</div>
        <div class="call-grid" id="call-grid"></div>
        <div class="call-controls">
            <button id="mute-btn" class="ctrl-btn mute">🎤</button>
            <button id="share-btn" class="ctrl-btn share">🖥️</button>
            <button id="end-call-btn" class="ctrl-btn end">✖</button>
        </div>
    </div>
</div>

<div id="upload-progress-container" class="upload-progress hidden">
    <div style="font-size: 0.8rem; margin-bottom: 5px;">Загрузка файла... <span id="progress-percent">0%</span></div>
    <div class="progress-bg"><div id="progress-fill" class="progress-fill"></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>
    /** FIREBASE CONFIG **/
    const firebaseConfig = {
        apiKey: "AIzaSyCtPt1M2ej6B91yBx5VepU8SnrfO9MQAlk",
        authDomain: "my-messenger-d1622.firebaseapp.com",
        projectId: "my-messenger-d1622",
        storageBucket: "my-messenger-d1622.firebasestorage.app",
        messagingSenderId: "103633663743",
        appId: "1:103633663743:web:77638c18e54353fc717eca"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let state = {
        users: [],
        chats: [],
        currentUser: JSON.parse(localStorage.getItem('wg_session')) || null,
        activeChatId: null,
        isRegistering: false,
        searchQuery: "",
        editingMsgIndex: null
    };

    const EMOJIS = ['👍', '❤️', '😂', '😮', '😢', '😡'];
    let pc = null;
    let localStream = null;
    let screenStream = null;
    let callInterval = null;
    let isMuted = false;
    let currentCallId = null;

    /** AUTH **/
    async function handleAuth() {
        const u = document.getElementById('auth-user').value.trim();
        const p = document.getElementById('auth-pass').value.trim();
        if (!u || !p) return alert("Пожалуйста, заполните все поля");

        if (state.isRegistering) {
            const userDoc = await db.collection('users').doc(u).get();
            if (userDoc.exists) return alert("Логин уже занят");
            await db.collection('users').doc(u).set({ username: u, password: p });
            state.currentUser = { username: u };
        } else {
            if (u === '1337' && p === '1337') {
                state.currentUser = { username: '1337' };
            } else {
                const userDoc = await db.collection('users').doc(u).get();
                if (userDoc.exists && userDoc.data().password === p) {
                    state.currentUser = { username: u };
                } else {
                    return alert("Неверный логин или пароль");
                }
            }
        }
        localStorage.setItem('wg_session', JSON.stringify(state.currentUser));
        initApp();
    }

    function toggleAuthMode() {
        state.isRegistering = !state.isRegistering;
        document.getElementById('auth-title').innerText = state.isRegistering ? 'Регистрация' : 'Добро пожаловать в WebGram';
        document.getElementById('auth-btn').innerText = state.isRegistering ? 'Зарегистрироваться' : 'Войти';
        document.getElementById('auth-toggle-text').innerHTML = state.isRegistering ?
            'Уже есть аккаунт? <span style="color:var(--accent-blue); text-decoration:underline">Войти</span>' : 'Нет аккаунта? <span style="color:var(--accent-blue); text-decoration:underline">Регистрация</span>';
    }

    function logout() {
        state.currentUser = null;
        localStorage.removeItem('wg_session');
        location.reload();
    }

    /** CORE APP **/
    async function initApp() {
        if (!state.currentUser) {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app-screen').classList.add('hidden');
        } else {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            const usersSnap = await db.collection('users').get();
            state.users = usersSnap.docs.map(doc => doc.data());
            setupGlobalChatListener();
            setupCallSignalListener();
        }
    }

    function setupGlobalChatListener() {
        db.collection('chats').onSnapshot(snapshot => {
            state.chats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderChatList();
        });
    }

    function renderChatList() {
        const listEl = document.getElementById('chat-list');
        listEl.innerHTML = '';
        const filteredChats = state.chats.filter(chat => {
            if (state.currentUser.username === '1337') return true;
            return chat.participants && chat.participants.includes(state.currentUser.username);
        });
        const otherUsers = state.users.filter(u => u.username !== state.currentUser.username);
        const displayChats = [...filteredChats];
        otherUsers.forEach(user => {
            const privateId = [state.currentUser.username, user.username].sort().join('_');
            if (!filteredChats.find(c => c.id === privateId)) {
                displayChats.push({ id: privateId, type: 'private', participants: [state.currentUser.username, user.username], name: user.username, messages: [] });
            }
        });
        const searchFiltered = displayChats.filter(chat => {
            const name = (chat.name || "").toLowerCase();
            const participants = (chat.participants || []).join(" ").toLowerCase();
            return name.includes(state.searchQuery.toLowerCase()) || participants.includes(state.searchQuery.toLowerCase());
        });
        searchFiltered.sort((a, b) => {
            const timeA = a.messages && a.messages.length ? a.messages[a.messages.length-1].timestamp : 0;
            const timeB = b.messages && b.messages.length ? b.messages[b.messages.length-1].timestamp : 0;
            return timeB - timeA;
        });
        searchFiltered.forEach(chat => {
            const item = document.createElement('div');
            item.className = `chat-item ${state.activeChatId === chat.id ? 'active' : ''}`;
            item.onclick = () => openChat(chat.id);
            const lastMsg = (chat.messages && chat.messages.length) ? chat.messages[chat.messages.length-1] : null;
            const timestamp = lastMsg ? new Date(lastMsg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
            item.innerHTML = `
                <div class="avatar">${(chat.name || chat.participants.find(p => p !== state.currentUser.username) || 'U').charAt(0)}</div>
                <div class="chat-info">
                    <span class="name">${chat.name || chat.participants.find(p => p !== state.currentUser.username)}</span>
                    <span class="last-msg">${lastMsg ? lastMsg.text : 'Начните общение'}</span>
                </div>
                <div class="chat-time">${timestamp}</div>
            `;
            listEl.appendChild(item);
        });
    }

    let activeChatUnsubscribe = null;
    async function openChat(chatId) {
        state.activeChatId = chatId;
        const chatDoc = await db.collection('chats').doc(chatId).get();
        if (!chatDoc.exists) {
            const newChat = { type: 'private', participants: chatId.split('_'), messages: [], name: null };
            await db.collection('chats').doc(chatId).set(newChat);
        }
        document.getElementById('empty-state').classList.add('hidden');
        document.getElementById('chat-content').classList.remove('hidden');
        document.getElementById('chat-window').classList.add('active');
        const chatData = (await db.collection('chats').doc(chatId).get()).data();
        const otherUser = chatData.participants.find(p => p !== state.currentUser.username);
        document.getElementById('header-name').innerText = chatData.name || otherUser || "Групповой чат";
        document.getElementById('header-avatar').innerText = (chatData.name || otherUser || "G").charAt(0);
        const addMemberBtn = document.getElementById('btn-add-member');
        if (chatData.type === 'group') {
            addMemberBtn.style.display = 'block';
            document.getElementById('header-status').innerText = `${chatData.participants.length} участников`;
        } else {
            addMemberBtn.style.display = 'none';
            document.getElementById('header-status').innerText = 'В сети';
        }
        if (activeChatUnsubscribe) activeChatUnsubscribe();
        activeChatUnsubscribe = db.collection('chats').doc(chatId).onSnapshot(doc => {
            const data = doc.data();
            renderMessages(data.messages || []);
        });
        renderChatList();
    }

    function renderMessages(messages) {
        const container = document.getElementById('messages-container');
        container.innerHTML = '';
        messages.forEach((msg, index) => {
            const isOwner = msg.sender === state.currentUser.username;
            const div = document.createElement('div');
            div.className = `message ${isOwner ? 'sent' : 'received'}`;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            const contentWrap = document.createElement('div');
            if (state.editingMsgIndex === index && isOwner) {
                const editInput = document.createElement('input');
                editInput.className = 'edit-input';
                editInput.value = msg.text;
                editInput.onkeypress = (e) => { if(e.key === 'Enter') saveEditedMessage(index, editInput.value); };
                contentWrap.appendChild(editInput);
            } else {
                const textNode = document.createElement('div');
                if (msg.type === 'file') {
                    textNode.innerHTML = `
                        <div class="file-card" onclick="window.open('${msg.fileUrl}', '_blank')">
                            ${msg.fileType.startsWith('image') ? `<img src="${msg.fileUrl}">` :
                              msg.fileType.startsWith('video') ? `<video src="${msg.fileUrl}" controls></video>` :
                              `<div class="avatar">📄</div>`}
                            <div style="font-size:0.8rem">
                                <b>${msg.fileName}</b><br>
                                ${(msg.fileSize / 1024).toFixed(1)} KB
                            </div>
                        </div>`;
                } else {
                    textNode.innerHTML = `${msg.sender !== state.currentUser.username && state.activeChatId.startsWith('group') ? `<div class="msg-sender">${msg.sender}</div>` : ''}${msg.text}`;
                }
                contentWrap.appendChild(textNode);
            }

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.innerHTML = `${msg.isEdited ? '<span class="edited-label">(изменено)</span>' : ''}${time}`;
            contentWrap.appendChild(meta);
            div.appendChild(contentWrap);

            // Reaction Display
            if (msg.reactions) {
                const reactDiv = document.createElement('div');
                reactDiv.className = 'reaction-display';
                Object.entries(msg.reactions).forEach(([emoji, users]) => {
                    reactDiv.innerHTML += `<div class="reaction-pill">${emoji} ${users.length}</div>`;
                });
                div.appendChild(reactDiv);
            }

            // Edit Button (Outside Bubble)
            if (isOwner && state.editingMsgIndex !== index && msg.type !== 'file') {
                const editBtn = document.createElement('div');
                editBtn.className = 'msg-edit-btn';
                editBtn.innerText = '✎';
                editBtn.onmouseover = () => {
                    editBtn.classList.add('visible');
                    editBtn.timeout = setTimeout(() => editBtn.classList.remove('visible'), 3000);
                };
                editBtn.onmouseout = () => {
                    clearTimeout(editBtn.timeout);
                    editBtn.timeout = setTimeout(() => editBtn.classList.remove('visible'), 3000);
                };
                editBtn.onclick = () => {
                    state.editingMsgIndex = index;
                    renderMessages(messages);
                };
                div.appendChild(editBtn);
            }

            // Reaction Bar (Below Bubble)
            const reactBar = document.createElement('div');
            reactBar.className = 'reaction-bar';
            EMOJIS.forEach(emoji => {
                const span = document.createElement('span');
                span.className = 'reaction-emoji';
                span.innerText = emoji;
                span.onclick = (e) => {
                    e.stopPropagation();
                    addReaction(state.activeChatId, index, emoji);
                };
                reactBar.appendChild(span);
            });
            div.appendChild(reactBar);

            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    async function addReaction(chatId, msgIndex, emoji) {
        const chatRef = db.collection('chats').doc(chatId);
        const doc = await chatRef.get();
        const messages = doc.data().messages || [];
        const msg = messages[msgIndex];
        if (!msg.reactions) msg.reactions = {};
        Object.keys(msg.reactions).forEach(e => {
            msg.reactions[e] = msg.reactions[e].filter(u => u !== state.currentUser.username);
            if (msg.reactions[e].length === 0) delete msg.reactions[e];
        });
        if (!msg.reactions[emoji]) msg.reactions[emoji] = [];
        msg.reactions[emoji].push(state.currentUser.username);
        await chatRef.update({ messages });
    }

    async function saveEditedMessage(index, newText) {
        const chatRef = db.collection('chats').doc(state.activeChatId);
        const doc = await chatRef.get();
        const messages = doc.data().messages || [];
        messages[index].text = newText;
        messages[index].isEdited = true;
        await chatRef.update({ messages });
        state.editingMsgIndex = null;
    }

    async function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text) return;
        const msg = { sender: state.currentUser.username, text: text, timestamp: Date.now(), isEdited: false, reactions: {} };
        await db.collection('chats').doc(state.activeChatId).update({
            messages: firebase.firestore.FieldValue.arrayUnion(msg)
        });
        input.value = '';
    }

    /** FILE UPLOADS **/
    async function handleFileUpload(file) {
        const progressContainer = document.getElementById('upload-progress-container');
        const progressFill = document.getElementById('progress-fill');
        const progressPercent = document.getElementById('progress-percent');

        progressContainer.classList.remove('hidden');

        const storageRef = storage.ref(`uploads/${Date.now()}_${file.name}`);
        const uploadTask = storageRef.put(file);

        uploadTask.on('state_changed',
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                progressFill.style.width = progress + '%';
                progressPercent.innerText = Math.round(progress) + '%';
            },
            (error) => { alert("Ошибка загрузки: " + error.message); },
            async () => {
                const downloadURL = await uploadTask.snapshot.ref.getDownloadURL();
                progressContainer.classList.add('hidden');

                const msg = {
                    sender: state.currentUser.username,
                    type: 'file',
                    fileUrl: downloadURL,
                    fileName: file.name,
                    fileType: file.type,
                    fileSize: file.size,
                    timestamp: Date.now(),
                    reactions: {}
                };
                await db.collection('chats').doc(state.activeChatId).update({
                    messages: firebase.firestore.FieldValue.arrayUnion(msg)
                });
            }
        );
    }

    /** GROUP MGMT **/
    function showGroupModal(isAdding = false) {
        document.getElementById('modal-container').classList.remove('hidden');
        document.getElementById('group-modal').classList.remove('hidden');
        const title = document.getElementById('modal-title');
        const nameInput = document.getElementById('group-name');
        if (isAdding) {
            title.innerText = "Добавить участников";
            nameInput.classList.add('hidden');
        } else {
            title.innerText = "Создать группу";
            nameInput.classList.remove('hidden');
        }
        const selector = document.getElementById('user-selector');
        selector.innerHTML = '';
        state.users.forEach(user => {
            if (user.username === state.currentUser.username) return;
            const div = document.createElement('div');
            div.className = 'user-option';
            div.innerHTML = `<input type="checkbox" value="${user.username}"> <div class="avatar" style="width:30px; height:30px; font-size:0.7rem">${user.username.charAt(0)}</div> ${user.username}`;
            div.onclick = (e) => {
                if (e.target.type !== 'checkbox') {
                    const cb = div.querySelector('input');
                    cb.checked = !cb.checked;
                }
                div.classList.toggle('selected', div.querySelector('input').checked);
            };
            selector.appendChild(div);
        });
    }

    async function confirmGroupAction() {
        const isAdding = document.getElementById('modal-title').innerText === "Добавить участников";
        const selectedUsers = Array.from(document.querySelectorAll('.user-option input:checked')).map(el => el.value);
        if (selectedUsers.length === 0) return alert("Выберите хотя бы одного участника");

        if (!isAdding) {
            const name = document.getElementById('group-name').value.trim();
            if (!name) return alert("Введите название группы");
            const newGroupId = 'group_' + Date.now();
            await db.collection('chats').doc(newGroupId).set({
                type: 'group', name: name, participants: [...selectedUsers, state.currentUser.username], messages: []
            });
            closeModal();
            openChat(newGroupId);
        } else {
            const chatRef = db.collection('chats').doc(state.activeChatId);
            const doc = await chatRef.get();
            const participants = doc.data().participants || [];
            await chatRef.update({ participants: [...new Set([...participants, ...selectedUsers])] });
            closeModal();
            openChat(state.activeChatId);
        }
    }

    function closeModal() {
        document.getElementById('modal-container').classList.add('hidden');
        document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
    }

    /** WebRTC CALLING SYSTEM **/
    async function setupCallSignalListener() {
        db.collection('calls').onSnapshot(snapshot => {
            snapshot.docChanges().forEach(change => {
                if (change.type === 'added') {
                    const call = change.doc.data();
                    if (call.callee === state.currentUser.username && call.status === 'ringing') {
                        currentCallId = change.doc.id;
                        document.getElementById('incoming-call-modal').classList.remove('hidden');
                        document.getElementById('modal-container').classList.remove('hidden');
                        document.getElementById('caller-name').innerText = call.caller;
                    }
                }
            });
        });
    }

    async function startCall() {
        const chat = state.chats.find(c => c.id === state.activeChatId);
        const participants = chat.participants;
        const callee = participants.find(p => p !== state.currentUser.username);
        if (!callee) return alert("Некому звонить");

        currentCallId = 'call_' + Date.now();
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        await db.collection('calls').doc(currentCallId).set({
            offer: { type: offer.type, sdp: offer.sdp },
            caller: state.currentUser.username,
            callee: callee,
            status: 'ringing',
            participants: participants
        });

        // Listen for answer
        db.collection('calls').doc(currentCallId).onSnapshot(doc => {
            const data = doc.data();
            if (data.answer && !pc.remoteDescription) {
                pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
            if (data.status === 'declined') endCall();
        });

        // Handle ICE Candidates
        pc.onicecandidate = (e) => {
            if (e.candidate) {
                db.collection('calls').doc(currentCallId).collection('candidates').add(e.candidate.toJSON());
            }
        };

        pc.ontrack = (e) => {
            const remoteStream = e.streams[0];
            document.getElementById('call-modal').classList.remove('hidden');
            document.getElementById('modal-container').classList.remove('hidden');
            const grid = document.getElementById('call-grid');
            grid.innerHTML = '';
            grid.appendChild(createVideoTile('Вы', localStream));
            grid.appendChild(createVideoTile('Собеседник', remoteStream));
            startTimer();
        };

        // Sync candidates
        db.collection('calls').doc(currentCallId).collection('candidates').onSnapshot(snap => {
            snap.docChanges().forEach(change => {
                if (change.type === 'added') {
                    pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                }
            });
        });
    }

    async function acceptCall() {
        document.getElementById('incoming-call-modal').classList.add('hidden');
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });

        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

        const callDoc = await db.collection('calls').doc(currentCallId).get();
        const offer = callDoc.data().offer;
        await pc.setRemoteDescription(new RTCSessionDescription(offer));

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await db.collection('calls').doc(currentCallId).update({
            answer: { type: answer.type, sdp: answer.sdp },
            status: 'accepted'
        });

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                db.collection('calls').doc(currentCallId).collection('candidates').add(e.candidate.toJSON());
            }
        };

        db.collection('calls').doc(currentCallId).collection('candidates').onSnapshot(snap => {
            snap.docChanges().forEach(change => {
                if (change.type === 'added') {
                    pc.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                }
            });
        });

        pc.ontrack = (e) => {
            const remoteStream = e.streams[0];
            document.getElementById('call-modal').classList.remove('hidden');
            document.getElementById('modal-container').classList.remove('hidden');
            const grid = document.getElementById('call-grid');
            grid.innerHTML = '';
            grid.appendChild(createVideoTile('Вы', localStream));
            grid.appendChild(createVideoTile('Собеседник', remoteStream));
            startTimer();
        };
    }

    function declineCall() {
        if (currentCallId) db.collection('calls').doc(currentCallId).update({ status: 'declined' });
        document.getElementById('incoming-call-modal').classList.add('hidden');
    }

    function createVideoTile(label, stream) {
        const tile = document.createElement('div');
        tile.className = 'video-tile';
        const video = document.createElement('video');
        video.srcObject = stream; video.autoplay = true; video.muted = (label === 'Вы');
        tile.appendChild(video);
        tile.innerHTML += `<div class="video-label">${label}</div>`;
        return tile;
    }

    function toggleMute() {
        isMuted = !isMuted;
        if (localStream) localStream.getAudioTracks()[0].enabled = !isMuted;
        document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🎤';
        document.getElementById('mute-btn').style.background = isMuted ? 'var(--danger)' : '#4d4d4d';
    }

    async function toggleScreenShare() {
        const btn = document.getElementById('share-btn');
        if (!screenStream) {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenStream.getTracks()[0];
                const sender = pc.getSenders().find(s => s.track.kind === 'video');
                sender.replaceTrack(videoTrack);
                btn.innerText = '⏹️'; btn.style.background = 'var(--danger)';
            } catch (err) { alert("Ошибка демонстрации экрана"); }
        } else {
            screenStream.getTracks().forEach(t => t.stop());
            const videoTrack = localStream.getVideoTracks()[0];
            const sender = pc.getSenders().find(s => s.track.kind === 'video');
            sender.replaceTrack(videoTrack);
            screenStream = null;
            btn.innerText = '🖥️'; btn.style.background = '#4d4d4d';
        }
    }

    function startTimer() {
        let sec = 0;
        const timerEl = document.getElementById('call-timer');
        clearInterval(callInterval);
        callInterval = setInterval(() => {
            sec++;
            timerEl.innerText = `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`;
        }, 1000);
    }

    function endCall() {
        if (currentCallId) db.collection('calls').doc(currentCallId).delete();
        if (pc) pc.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (screenStream) screenStream.getTracks().forEach(t => t.stop());
        clearInterval(callInterval);
        closeModal();
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('auth-btn').addEventListener('click', handleAuth);
        document.getElementById('auth-toggle').addEventListener('click', toggleAuthMode);
        document.getElementById('btn-logout').addEventListener('click', logout);
        document.getElementById('btn-create-group').addEventListener('click', () => showGroupModal(false));
        document.getElementById('search-chat').addEventListener('input', (e) => {
            state.searchQuery = e.target.value;
            renderChatList();
        });
        document.getElementById('btn-send').addEventListener('click', sendMessage);
        document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('back-btn').addEventListener('click', () => { document.getElementById('chat-window').classList.remove('active'); });
        document.getElementById('btn-call').addEventListener('click', startCall);
        document.getElementById('btn-add-member').addEventListener('click', () => showGroupModal(true));
        document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
        document.getElementById('btn-modal-confirm').addEventListener('click', confirmGroupAction);
        document.getElementById('mute-btn').addEventListener('click', toggleMute);
        document.getElementById('share-btn').addEventListener('click', toggleScreenShare);
        document.getElementById('end-call-btn').addEventListener('click', endCall);
        document.getElementById('btn-accept-call').addEventListener('click', acceptCall);
        document.getElementById('btn-decline-call').addEventListener('click', declineCall);
        document.getElementById('btn-attach').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            if (e.target.files[0]) handleFileUpload(e.target.files[0]);
        });
        initApp();
    });
</script>
</body>
